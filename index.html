<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1f">
  <title>ФизМат RPG — 7 класс. Полный учебник</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:wght@400;500;600;700&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
  <style>
    /* ============================================================
       ВСЕ СТИЛИ (полный набор из оригинального файла)
       ============================================================ */
    :root {
      --space-void:   #0a0a1f;
      --space-deep:   #12122e;
      --space-panel:  #181a3a;
      --space-line:   #2a2d55;
      --plasma-cyan:  #38e1ff;
      --quantum-violet:#a06bff;
      --star-gold:    #ffd166;
      --reaction-pink:#ff5d8f;
      --bio-green:    #4ade80;
      --text:         #eef1ff;
      --muted:        #9aa0c7;
      --text-dim:     #6f76a3;
      --accent:       #38e1ff;
      --accent-2:     #a06bff;
      --radius:   16px;
      --radius-s: 10px;
      --shadow:   0 10px 40px rgba(0,0,0,.45);
      --glow:     0 0 18px rgba(56,225,255,.45);
      --maxw:     920px;
      --font-display: "Russo One", "Segoe UI", system-ui, sans-serif;
      --font-body:    "Rubik", "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--space-void);
      background-image:
        radial-gradient(1200px 700px at 80% -10%, rgba(160,107,255,.18), transparent 60%),
        radial-gradient(900px 600px at 10% 0%, rgba(56,225,255,.14), transparent 55%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 20% 30%, #fff, transparent),
        radial-gradient(1px 1px at 70% 80%, #cfe8ff, transparent),
        radial-gradient(1px 1px at 40% 60%, #fff, transparent),
        radial-gradient(2px 2px at 85% 25%, #fff, transparent),
        radial-gradient(1px 1px at 55% 15%, #b9c7ff, transparent),
        radial-gradient(1px 1px at 10% 85%, #fff, transparent),
        radial-gradient(1px 1px at 90% 65%, #fff, transparent);
      opacity: .5;
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity:.32 } to { opacity:.6 } }
    h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 400; letter-spacing:.3px; margin:0 0 .4em; }
    a { color: var(--accent); }
    button { font-family: var(--font-body); cursor: pointer; }
    input { font-family: var(--font-body); }
    .app-wrap { position: relative; z-index: 1; max-width: var(--maxw); margin: 0 auto; padding: 0 16px 120px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--space-line); background: var(--space-panel); color: var(--text);
      padding: 11px 18px; border-radius: var(--radius-s); font-size: 15px; font-weight: 500;
      transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--accent); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0a0a1f; border: none; font-weight: 600; box-shadow: 0 6px 22px rgba(56,225,255,.28);
    }
    .btn-primary:hover { box-shadow: 0 10px 30px rgba(56,225,255,.42); }
    .btn-ghost { background: transparent; }
    .btn-gold { background: linear-gradient(135deg, var(--star-gold), #ffb02e); color:#241a00; border:none; font-weight:600; }
    .btn[disabled] { opacity:.45; cursor: not-allowed; transform:none; }
    .btn-sm { padding: 7px 13px; font-size: 13px; }
    :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

    .hud {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; gap: 14px;
      margin: 0 -16px 20px; padding: 12px 16px;
      background: rgba(18,18,46,.86);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--space-line);
    }
    .hud-avatar {
      width: 52px; height: 52px; flex: 0 0 52px; border-radius: 50%;
      display: grid; place-items: center; font-size: 26px;
      background: radial-gradient(circle at 30% 25%, #20214a, #111128);
      border: 2px solid var(--accent); box-shadow: 0 0 14px var(--accent);
    }
    .hud-main { flex: 1; min-width: 0; }
    .hud-row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .hud-name { font-family: var(--font-display); font-size: 17px; }
    .hud-level {
      font-size: 12px; padding: 2px 9px; border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a1f; font-weight:600;
    }
    .hud-title { font-size: 12px; color: var(--muted); }
    .hud-bar { margin-top: 7px; }
    .hud-stats { display:flex; gap: 14px; align-items:center; }
    .hud-chip { display:flex; align-items:center; gap:5px; font-size:14px; font-weight:600; white-space:nowrap; }
    .hud-chip .ico { font-size: 15px; }
    .coins { color: var(--star-gold); }
    .studied { color: var(--plasma-cyan); }
    .hud-sound {
      background: transparent; border: 1px solid var(--space-line); color: var(--muted);
      width: 38px; height: 38px; border-radius: 10px; font-size: 16px; display:grid; place-items:center;
    }
    .hud-sound:hover { border-color: var(--accent); color: var(--text); }

    .bar { height: 9px; background: #0e0f24; border-radius: 999px; overflow: hidden; border: 1px solid var(--space-line); }
    .bar-fill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 0 10px var(--accent);
    }
    .bar-xp .bar-fill { background: linear-gradient(90deg, var(--star-gold), #ff9f1c); box-shadow: 0 0 10px rgba(255,209,102,.6); }
    .bar-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }

    .tabs {
      display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap;
    }
    .tab {
      flex: 1; min-width: 92px;
      display:flex; flex-direction: column; align-items:center; gap:3px;
      padding: 10px 6px; border-radius: var(--radius-s);
      background: var(--space-deep); border: 1px solid var(--space-line); color: var(--muted);
      font-size: 13px; font-weight: 500; transition: all .15s ease;
    }
    .tab .ico { font-size: 19px; }
    .tab:hover { color: var(--text); border-color: var(--accent); }
    .tab.active { color: #0a0a1f; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; font-weight: 600; }

    .screen-head { margin-bottom: 18px; }
    .screen-head h2 { font-size: clamp(22px, 5vw, 30px); }
    .screen-head .sub { color: var(--muted); font-size: 14px; }
    .crumbs { display:flex; align-items:center; gap:8px; font-size:13px; color: var(--muted); margin-bottom: 12px; flex-wrap: wrap; }
    .crumbs a { cursor:pointer; }
    .crumbs .sep { color: var(--text-dim); }

    .creation { max-width: 760px; margin: 0 auto; padding-top: 40px; text-align: center; }
    .creation .logo { font-size: 46px; margin-bottom: 6px; }
    .creation h1 { font-size: clamp(30px, 7vw, 46px);
      background: linear-gradient(120deg, var(--plasma-cyan), var(--quantum-violet) 60%, var(--star-gold));
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .creation .tagline { color: var(--muted); font-size: 16px; margin-bottom: 30px; }
    .field { text-align: left; margin: 0 auto 26px; max-width: 460px; }
    .field label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .field input {
      width: 100%; padding: 14px 16px; font-size: 17px; color: var(--text);
      background: var(--space-panel); border: 1px solid var(--space-line); border-radius: var(--radius-s);
    }
    .field input:focus { border-color: var(--accent); outline: none; box-shadow: var(--glow); }
    .class-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 28px; }
    .class-card {
      text-align: left; padding: 18px; border-radius: var(--radius);
      background: var(--space-panel); border: 2px solid var(--space-line);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease; position: relative;
    }
    .class-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
    .class-card.selected { border-color: var(--accent); box-shadow: var(--glow); }
    .class-card.selected::after { content:"✓"; position:absolute; top:12px; right:14px; color: var(--accent); font-weight:700; }
    .class-card .cc-ico { font-size: 34px; }
    .class-card .cc-name { font-family: var(--font-display); font-size: 18px; margin: 6px 0 2px; }
    .class-card .cc-bonus { color: var(--star-gold); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .class-card .cc-blurb { color: var(--muted); font-size: 13px; }

    .starmap { position: relative; padding: 6px 0 20px; }
    .world-node {
      position: relative; display: flex; gap: 16px; align-items: stretch;
      padding: 4px 0 26px; padding-left: 64px;
    }
    .world-node::before {
      content:""; position:absolute; left: 27px; top: 56px; bottom: -8px; width: 3px;
      background: linear-gradient(var(--accent), transparent);
      opacity: .5;
    }
    .world-node:last-child::before { display:none; }
    .node-orb {
      position: absolute; left: 0; top: 6px;
      width: 56px; height: 56px; border-radius: 50%; display:grid; place-items:center; font-size: 26px;
      background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26);
      border: 2px solid var(--space-line); z-index: 2;
    }
    .world-node.open .node-orb { border-color: var(--w-accent, var(--accent)); box-shadow: 0 0 16px var(--w-accent, var(--accent)); }
    .world-node.current .node-orb { animation: orbPulse 2.2s ease-in-out infinite; }
    .world-node.locked .node-orb { filter: grayscale(.7) brightness(.7); }
    @keyframes orbPulse {
      0%,100% { box-shadow: 0 0 12px var(--w-accent, var(--accent)); }
      50%     { box-shadow: 0 0 26px var(--w-accent, var(--accent)), 0 0 6px #fff; }
    }
    .world-card {
      flex: 1; padding: 16px 18px; border-radius: var(--radius);
      background: var(--space-panel); border: 1px solid var(--space-line);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .world-node.open .world-card { cursor: pointer; }
    .world-node.open .world-card:hover { transform: translateX(4px); border-color: var(--w-accent, var(--accent)); box-shadow: var(--shadow); }
    .world-node.locked .world-card { opacity: .62; }
    .world-card .wc-top { display:flex; align-items:center; justify-content: space-between; gap: 10px; }
    .world-card .wc-name { font-family: var(--font-display); font-size: 18px; }
    .world-card .wc-blurb { color: var(--muted); font-size: 13px; margin: 6px 0 10px; }
    .badge {
      font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; white-space: nowrap;
      border: 1px solid var(--space-line); color: var(--muted);
    }
    .badge.open { color: var(--bio-green); border-color: rgba(74,222,128,.4); }
    .badge.soon { color: var(--star-gold); border-color: rgba(255,209,102,.35); }
    .badge.done { color: var(--plasma-cyan); border-color: rgba(56,225,255,.4); }
    .wc-progress { font-size: 12px; color: var(--muted); }

    .topic-list { display: grid; gap: 12px; }
    .topic-row {
      display:flex; align-items:center; gap: 14px; padding: 14px 16px;
      background: var(--space-panel); border: 1px solid var(--space-line); border-radius: var(--radius);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .topic-row.unlocked { cursor: pointer; }
    .topic-row.unlocked:hover { transform: translateX(4px); border-color: var(--accent); box-shadow: var(--shadow); }
    .topic-row.locked { opacity: .55; }
    .topic-ico {
      width: 46px; height: 46px; flex:0 0 46px; border-radius: 12px; display:grid; place-items:center; font-size: 23px;
      background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26); border: 1px solid var(--space-line);
    }
    .topic-row.done .topic-ico { border-color: var(--bio-green); box-shadow: 0 0 12px rgba(74,222,128,.4); }
    .topic-meta { flex:1; min-width: 0; }
    .topic-meta .tname { font-family: var(--font-display); font-size: 16px; }
    .topic-meta .ttag { font-size: 13px; color: var(--muted); }
    .topic-mini { display:flex; gap:5px; margin-top:7px; }
    .pip { width: 22px; height: 5px; border-radius: 99px; background: #0e0f24; border: 1px solid var(--space-line); }
    .pip.on { background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .topic-right { text-align:right; }

    .console-head {
      display:flex; gap: 14px; align-items: center; padding: 18px;
      border-radius: var(--radius); background: linear-gradient(135deg, rgba(56,225,255,.08), rgba(160,107,255,.08));
      border: 1px solid var(--space-line); margin-bottom: 18px;
    }
    .console-head .ch-ico { font-size: 40px; }
    .console-head h2 { margin:0; font-size: clamp(20px,5vw,26px); }
    .console-head .ch-tag { color: var(--muted); font-size: 14px; }

    .stages { display:grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 22px; }
    .stage-tab {
      position: relative; text-align:center; padding: 12px 6px; border-radius: var(--radius-s);
      background: var(--space-deep); border: 1px solid var(--space-line); color: var(--muted);
      transition: all .15s ease;
    }
    .stage-tab .st-step { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
    .stage-tab .st-ico { font-size: 22px; display:block; margin: 3px 0; }
    .stage-tab .st-name { font-size: 12px; font-weight: 500; }
    .stage-tab:hover { color: var(--text); border-color: var(--accent); }
    .stage-tab.active { color:#0a0a1f; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .stage-tab.done::after {
      content:"✓"; position:absolute; top:6px; right:8px; font-size: 12px; font-weight:700;
      color: var(--bio-green);
    }
    .stage-tab.active.done::after { color:#0a3; }

    .panel {
      background: var(--space-panel); border: 1px solid var(--space-line);
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    }
    .panel h3 { font-size: 18px; }
    .panel-intro { color: var(--muted); margin-bottom: 16px; }

    .theory-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; }
    .flip { perspective: 1000px; height: 210px; }
    .flip-inner { position: relative; width:100%; height:100%; transition: transform .6s; transform-style: preserve-3d; cursor:pointer; }
    .flip.flipped .flip-inner { transform: rotateY(180deg); }
    .flip-face {
      position:absolute; inset:0; backface-visibility: hidden; border-radius: var(--radius);
      padding: 16px; display:flex; flex-direction:column; border: 1px solid var(--space-line);
    }
    .flip-front { background: linear-gradient(160deg, var(--space-panel), #15163a); align-items:center; justify-content:center; text-align:center; gap:8px; }
    .flip-front .tf-emoji { font-size: 40px; }
    .flip-front .tf-title { font-family: var(--font-display); font-size: 15px; }
    .flip-front .tf-hint { font-size: 12px; color: var(--text-dim); margin-top: auto; }
    .flip-back { background: linear-gradient(160deg, #15163a, var(--space-deep)); transform: rotateY(180deg); overflow:auto; }
    .flip-back .tf-text { font-size: 13px; }
    .flip-back .tf-formula {
      font-family: var(--font-display); color: var(--accent); background: #0e0f24;
      border:1px solid var(--space-line); border-radius: 8px; padding: 7px 10px; margin: 8px 0; text-align:center; font-size: 14px;
    }
    .flip-back .tf-example { font-size: 12px; color: var(--muted); }
    .flip.read .flip-front { border-color: var(--bio-green); }
    .flip.read .flip-front::after { content:"✓"; position:absolute; top:8px; right:10px; color: var(--bio-green); font-weight:700; }

    .exp-steps { counter-reset: step; list-style:none; padding:0; margin: 0 0 16px; display:grid; gap:10px; }
    .exp-steps li { position: relative; padding: 12px 14px 12px 46px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); font-size: 14px; }
    .exp-steps li::before {
      counter-increment: step; content: counter(step);
      position:absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 50%; display:grid; place-items:center; font-size: 13px; font-weight:700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a1f;
    }
    .exp-insight { background: rgba(56,225,255,.08); border-left: 3px solid var(--accent); padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }

    .q-text { font-size: 16px; margin-bottom: 14px; }
    .options { display:grid; gap: 10px; }
    .option {
      text-align:left; padding: 13px 16px; border-radius: var(--radius-s);
      background: var(--space-deep); border: 1px solid var(--space-line); color: var(--text); font-size: 15px;
      transition: all .12s ease;
    }
    .option:hover:not(:disabled) { border-color: var(--accent); transform: translateX(3px); }
    .option.correct { border-color: var(--bio-green); background: rgba(74,222,128,.14); color: var(--bio-green); }
    .option.wrong { border-color: var(--reaction-pink); background: rgba(255,93,143,.12); color: var(--reaction-pink); }
    .option:disabled { cursor: default; }
    .q-progress { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

    .feedback { margin-top: 14px; padding: 13px 15px; border-radius: var(--radius-s); font-size: 14px; display:flex; gap: 10px; align-items: flex-start; }
    .feedback.ok { background: rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); }
    .feedback.no { background: rgba(255,93,143,.08); border:1px solid rgba(255,93,143,.3); }
    .feedback .fb-ico { font-size: 18px; }

    .problem .q-text { margin-bottom: 16px; }
    .answer-row { display:flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .answer-row input {
      flex: 1; min-width: 140px; padding: 13px 15px; font-size: 16px; color: var(--text);
      background: var(--space-deep); border: 1px solid var(--space-line); border-radius: var(--radius-s);
    }
    .answer-row input:focus { border-color: var(--accent); outline:none; box-shadow: var(--glow); }
    .answer-row .unit { color: var(--muted); font-size: 15px; font-weight:600; }
    .solution { margin-top: 14px; padding: 13px 15px; background: rgba(160,107,255,.08); border-left: 3px solid var(--quantum-violet); border-radius: 8px; font-size: 14px; }

    .boss-panel {
      background: radial-gradient(circle at 50% 0%, rgba(255,93,143,.16), var(--space-panel) 60%);
      border: 1px solid rgba(255,93,143,.4); position: relative; overflow: hidden;
    }
    .boss-panel::before {
      content:""; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(400px 200px at 50% -30%, rgba(255,93,143,.25), transparent 70%);
    }
    .boss-head { display:flex; gap: 14px; align-items:center; margin-bottom: 14px; }
    .boss-head .b-ico { font-size: 44px; filter: drop-shadow(0 0 10px var(--reaction-pink)); }
    .boss-head h3 { color: var(--reaction-pink); margin:0; font-size: 22px; }
    .boss-story { font-size: 15px; margin-bottom: 18px; }
    .boss-defeated { text-align:center; padding: 10px; }
    .boss-defeated .bd-emoji { font-size: 52px; }

    .subtabs { display:flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .subtab {
      padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      background: var(--space-deep); border:1px solid var(--space-line); color: var(--muted);
    }
    .subtab.active { color: var(--text); border-color: var(--accent); background: rgba(56,225,255,.08); }
    .subtab:hover { color: var(--text); }

    .hero-sheet { display:grid; grid-template-columns: auto 1fr; gap: 20px; align-items:center; }
    .hero-sheet .hs-avatar {
      width: 96px; height:96px; border-radius: 50%; display:grid; place-items:center; font-size: 48px;
      background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26); border: 3px solid var(--accent); box-shadow: 0 0 22px var(--accent);
    }
    .hs-info .hs-name { font-family: var(--font-display); font-size: 24px; }
    .hs-info .hs-class { color: var(--muted); margin-bottom: 4px; }
    .hs-info .hs-bonus { color: var(--star-gold); font-size: 13px; font-weight: 600; }
    .stat-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 12px; margin-top: 18px; }
    .stat-box { text-align:center; padding: 14px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); }

const Storage = {
  KEY: "fizmat7_save",
  read() { try { return localStorage.getItem(this.KEY); } catch(e) { return null; } },
  write(str) { try { localStorage.setItem(this.KEY, str); } catch(e) {} },
  clear() { try { localStorage.removeItem(this.KEY); } catch(e) {} }
};

function defaultState() {
  return {
    hero: null,
    progress: {},
    achievements: [],
    items: [],
    unlocks: { avatars: ["av_default"], accents: ["ac_cyan"] },
    equipped: { avatar: "av_default", accent: "ac_cyan" },
    stats: { correctAnswers: 0, questionsAnswered: 0, problemsSolved: 0, experiments: 0, topicsCompleted: 0, mistakes: 0, recoveries: 0, bossesDefeated: 0, chaptersCompleted: 0 },
    adventure: { current: null, scene: 0, completed: {} },
    style: { experiment: 0, formula: 0, risk: 0 },
    settings: { sound: true }
  };
}

const State = {
  data: defaultState(),
  pendingEvents: [],

  load() {
    const raw = Storage.read();
    if (raw) {
      try {
        const p = JSON.parse(raw);
        this.data = Object.assign(defaultState(), p);
        this.data.stats = Object.assign(defaultState().stats, p.stats || {});
        this.data.unlocks = Object.assign(defaultState().unlocks, p.unlocks || {});
        this.data.equipped = Object.assign(defaultState().equipped, p.equipped || {});
        this.data.settings = Object.assign(defaultState().settings, p.settings || {});
        this.data.adventure = Object.assign(defaultState().adventure, p.adventure || {});
        this.data.style = Object.assign(defaultState().style, p.style || {});
      } catch(e) {
        this.data = defaultState();
      }
    }
    return this.data;
  },

  save() { Storage.write(JSON.stringify(this.data)); },

  reset() { Storage.clear(); this.data = defaultState(); },

  hasSave() { return !!Storage.read(); },

  emit(type, payload) { this.pendingEvents.push({ type, payload }); },

  takeEvents() { const e = this.pendingEvents; this.pendingEvents = []; return e; },

  createHero(name, classId) {
    this.data.hero = {
      name: (name || "Герой").trim().slice(0, 20),
      classId: classId,
      level: 1,
      xp: 0,
      coins: 0
    };
    this.collectAchievements();
    this.save();
  },

  heroClass() { return GAME.classes.find(c => c.id === this.data.hero.classId); },

  levelFromXP(xp) {
    let l = 1;
    for (const L of GAME.levels) if (xp >= L.xpStart) l = L.level;
    return l;
  },

  levelInfo() {
    const xp = this.data.hero ? this.data.hero.xp : 0;
    const level = this.levelFromXP(xp);
    const cur = GAME.levels[level - 1];
    const next = GAME.levels[level];
    const xpIntoLevel = xp - cur.xpStart;
    const xpForLevel = next ? next.xpStart - cur.xpStart : 0;
    const percent = next ? Math.min(100, Math.round((xpIntoLevel / xpForLevel) * 100)) : 100;
    return { level, title: cur.title, xp, xpIntoLevel, xpForLevel, percent, isMax: !next };
  },

  bonusMultiplier(actionType) {
    if (!this.data.hero) return 1;
    const cls = this.heroClass();
    const map = { theory: "theory", question: "theory", experiment: "experiments", problem: "problems", boss: "space" };
    return cls && map[actionType] === cls.bonusType ? 1.1 : 1;
  },

  addXP(amount, actionType) {
    if (!this.data.hero) return { gained: 0, leveledUp: false };
    const mult = this.bonusMultiplier(actionType);
    const gained = Math.round(amount * mult);
    const oldLevel = this.data.hero.level;
    this.data.hero.xp += gained;
    const newLevel = this.levelFromXP(this.data.hero.xp);
    this.data.hero.level = newLevel;
    if (newLevel > oldLevel) this.emit("levelup", { level: newLevel, title: GAME.levels[newLevel - 1].title });
    return { gained, leveledUp: newLevel > oldLevel, newLevel };
  },

  addCoins(n) { if (this.data.hero) this.data.hero.coins += n; },

  grant(rewardKey, actionType) {
    const r = GAME.rewards[rewardKey];
    if (!r) return { xp: 0, coins: 0 };
    const res = this.addXP(r.xp, actionType);
    this.addCoins(r.coins);
    return { xp: res.gained, coins: r.coins, leveledUp: res.leveledUp };
  },

  ensureTopic(topicId) {
    if (this.data.progress[topicId]) return this.data.progress[topicId];
    const t = GAME.topics.find(x => x.id === topicId);
    if (!t) return null;
    this.data.progress[topicId] = {
      started: false,
      theory: t.theory.map(() => false),
      experiment: false,
      questions: t.questions.map(() => false),
      problems: t.problems.map(() => false),
      bossDone: false,
      completed: false,
      mistakes: 0
    };
    return this.data.progress[topicId];
  },

  topicStageDone(topicId) {
    const p = this.data.progress[topicId];
    if (!p) return { theory: false, experiment: false, questions: false, problems: false, boss: false };
    return {
      theory: p.theory.every(Boolean),
      experiment: p.experiment,
      questions: p.questions.every(Boolean),
      problems: p.problems.every(Boolean),
      boss: p.bossDone
    };
  },

  markStarted(topicId) {
    const p = this.ensureTopic(topicId);
    if (p && !p.started) { p.started = true; this.save(); }
  },

  readTheoryCard(topicId, idx) {
    const p = this.ensureTopic(topicId);
    if (!p || p.theory[idx]) return null;
    p.theory[idx] = true;
    const g = this.grant("theoryCard", "theory");
    this.afterAction(topicId);
    return g;
  },

  doExperiment(topicId) {
    const p = this.ensureTopic(topicId);
    if (!p || p.experiment) return null;
    p.experiment = true;
    this.data.stats.experiments++;
    const g = this.grant("experiment", "experiment");
    this.afterAction(topicId);
    return g;
  },

  answerQuestion(topicId, idx, isCorrect) {
    const p = this.ensureTopic(topicId);
    if (!p) return { correct: false };
    this.data.stats.questionsAnswered++;
    if (!isCorrect) {
      p.mistakes++;
      this.data.stats.mistakes++;
      this.afterAction(topicId);
      return { correct: false };
    }
    this.data.stats.correctAnswers++;
    const newlyCorrect = !p.questions[idx];
    if (newlyCorrect) p.questions[idx] = true;
    let g = null;
    if (newlyCorrect) g = this.grant("question", "question");
    this.afterAction(topicId);
    return Object.assign({ correct: true }, g || {});
  },

  solveProblem(topicId, idx, isCorrect) {
    const p = this.ensureTopic(topicId);
    if (!p) return { correct: false };
    if (!isCorrect) {
      p.mistakes++;
      this.data.stats.mistakes++;
      this.afterAction(topicId);
      return { correct: false };
    }
    const newlyCorrect = !p.problems[idx];
    if (newlyCorrect) { p.problems[idx] = true; this.data.stats.problemsSolved++; }
    let g = null;
    if (newlyCorrect) g = this.grant("problem", "problem");
    this.afterAction(topicId);
    return Object.assign({ correct: true }, g || {});
  },

  defeatBoss(topicId, isCorrect) {
    const p = this.ensureTopic(topicId);
    if (!p) return { correct: false };
    if (!isCorrect) {
      p.mistakes++;
      this.data.stats.mistakes++;
      this.afterAction(topicId);
      return { correct: false };
    }
    if (p.bossDone) {
      this.afterAction(topicId);
      return { correct: true, already: true };
    }
    p.bossDone = true;
    this.data.stats.bossesDefeated++;
    const g = this.grant("boss", "boss");
    this.emit("bossWin", { topicId });
    const item = GAME.items.find(it => it.topicId === topicId);
    if (item && !this.data.items.includes(item.id)) {
      this.data.items.push(item.id);
      this.emit("item", item);
    }
    this.afterAction(topicId);
    return Object.assign({ correct: true }, g);
  },

  maybeCompleteTopic(topicId) {
    const p = this.data.progress[topicId];
    if (!p || p.completed) return;
    const s = this.topicStageDone(topicId);
    if (s.theory && s.experiment && s.questions && s.problems && s.boss) {
      p.completed = true;
      this.data.stats.topicsCompleted++;
      const g = this.grant("topicDone", "topicDone");
      this.emit("topicComplete", { topicId, reward: g });
    }
  },

  afterAction(topicId) {
    this.maybeCompleteTopic(topicId);
    this.collectAchievements();
    this.save();
  },

  collectAchievements() {
    let added = true;
    let guard = 0;
    while (added && guard < 10) {
      added = false;
      guard++;
      for (const a of GAME.achievements) {
        if (this.data.achievements.includes(a.id)) continue;
        if (a.check(this.data)) {
          this.data.achievements.push(a.id);
          this.grant("achievement", "achievement");
          this.emit("achievement", a);
          added = true;
        }
      }
    }
  },

  topicsOfWorld(worldId) {
    return GAME.topics.filter(t => t.worldId === worldId);
  },

  isTopicUnlocked(topicId) {
    const t = GAME.topics.find(x => x.id === topicId);
    if (!t) return false;
    const list = this.topicsOfWorld(t.worldId);
    const idx = list.findIndex(x => x.id === topicId);
    if (idx === 0) return true;
    const prev = list[idx - 1];
    const pp = this.data.progress[prev.id];
    return !!(pp && pp.completed);
  },

  isWorldUnlocked(worldId) {
    const w = GAME.worlds.find(x => x.id === worldId);
    return w && w.status === "open";
  },

  weakTopics() {
    return GAME.topics.filter(t => {
      const p = this.data.progress[t.id];
      return p && p.started && p.mistakes >= 2;
    });
  },

  buyAvatar(id) {
    const item = GAME.shop.avatars.find(a => a.id === id);
    if (!item || this.data.unlocks.avatars.includes(id)) return false;
    if (this.data.hero.coins < item.price) return false;
    this.data.hero.coins -= item.price;
    this.data.unlocks.avatars.push(id);
    this.save();
    return true;
  },

  buyAccent(id) {
    const item = GAME.shop.accents.find(a => a.id === id);
    if (!item || this.data.unlocks.accents.includes(id)) return false;
    if (this.data.hero.coins < item.price) return false;
    this.data.hero.coins -= item.price;
    this.data.unlocks.accents.push(id);
    this.save();
    return true;
  },

  equipAvatar(id) {
    if (this.data.unlocks.avatars.includes(id)) {
      this.data.equipped.avatar = id;
      this.save();
    }
  },

  equipAccent(id) {
    if (this.data.unlocks.accents.includes(id)) {
      this.data.equipped.accent = id;
      this.save();
    }
  },

  equippedAvatarIcon() {
    const a = GAME.shop.avatars.find(x => x.id === this.data.equipped.avatar);
    return a ? a.icon : "🧑‍🚀";
  },

  accentColor() {
    const a = GAME.shop.accents.find(x => x.id === this.data.equipped.accent);
    return a ? a.color : "#38e1ff";
  },

  toggleSound() {
    this.data.settings.sound = !this.data.settings.sound;
    this.save();
    return this.data.settings.sound;
  },

  topicsStudied() {
    return Object.values(this.data.progress).filter(p => p.completed).length;
  },

  totalTopics() {
    return GAME.topics.length;
  },

  // Сюжетные главы (упрощённо, для совместимости)
  chapterById(chId) { return (GAME.chapters || []).find(c => c.id === chId); },
  isChapterDone(chId) { return !!this.data.adventure.completed[chId]; },
  startChapter(chId) { const a = this.data.adventure; if (a.current !== chId) { a.current = chId; if (this.isChapterDone(chId)) a.scene = 0; } if (typeof a.scene !== "number") a.scene = 0; this.save(); return a.scene; },
  advanceScene(chId) { const a = this.data.adventure; if (a.current !== chId) { a.current = chId; a.scene = 0; } a.scene = (a.scene || 0) + 1; this.save(); return a.scene; },
  sceneIndex(chId) { const a = this.data.adventure; return a.current === chId ? (a.scene || 0) : 0; },
  completeChapter(chId) { const ch = this.chapterById(chId); if (!ch) return { xp: 0, coins: 0, already: true }; const already = this.isChapterDone(chId); if (!already) { this.data.adventure.completed[chId] = true; this.data.stats.chaptersCompleted++; } const r = ch.reward || { xp: 0, coins: 0 }; const res = already ? { gained: 0 } : this.addXP(r.xp, "boss"); if (!already && r.coins) this.addCoins(r.coins); this.emit("chapterComplete", { chapterId: chId, title: ch.title, reward: { xp: res.gained, coins: already ? 0 : r.coins } }); if (!already) this.collectAchievements(); this.save(); return { xp: res.gained, coins: already ? 0 : r.coins, leveledUp: res.leveledUp, already }; },
  recordStyle(kind) { if (!this.data.style) this.data.style = { experiment: 0, formula: 0, risk: 0 }; if (kind in this.data.style) { this.data.style[kind]++; this.save(); } },
  styleLabel() { const s = this.data.style || {}; const total = (s.experiment || 0) + (s.formula || 0) + (s.risk || 0); if (!total) return "Начинающий исследователь"; const names = { experiment: "Экспериментатор", formula: "Теоретик", risk: "Смельчак" }; let best = "experiment", max = -1; ["experiment", "formula", "risk"].forEach(k => { if ((s[k] || 0) > max) { max = s[k] || 0; best = k; } }); return names[best]; },
  awardStory(xp, coins, actionType) { const res = this.addXP(xp || 0, actionType); if (coins) this.addCoins(coins); this.save(); return { xp: res.gained, coins: coins || 0, leveledUp: res.leveledUp }; },
  discoveryUnlocked(d) { if (!d) return false; if (d.chapterId && this.isChapterDone(d.chapterId)) return true; if (d.topicId && this.data.progress[d.topicId] && this.data.progress[d.topicId].completed) return true; return false; },
  discoveriesUnlocked() { return (GAME.discoveries || []).filter(d => this.discoveryUnlocked(d)).length; },
  totalDiscoveries() { return (GAME.discoveries || []).length; }
};

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function topic(id) { return GAME.topics.find(t => t.id === id); }
  function world(id) { return GAME.worlds.find(w => w.id === id); }
  function chapter(id) { return (GAME.chapters || []).find(c => c.id === id); }
  function parseNum(s) { if (s == null) return NaN; return parseFloat(String(s).replace(",", ".").replace(/\s/g, "").replace("−", "-")); }
  function checkNum(val, ans, tol) { if (isNaN(val)) return false; const t = tol != null ? tol : 0.01; return Math.abs(val - ans) <= t + 1e-9; }

  function setAccent() {
    const c = State.accentColor();
    document.documentElement.style.setProperty("--accent", c);
    let c2 = "#a06bff";
    if (c.toLowerCase() === "#a06bff") c2 = "#38e1ff";
    document.documentElement.style.setProperty("--accent-2", c2);
  }

  let actx = null;
  function tone(type) {
    if (!State.data.settings.sound) return;
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.connect(g);
      g.connect(actx.destination);
      const now = actx.currentTime;
      if (type === "correct") {
        o.frequency.setValueAtTime(660, now);
        o.frequency.exponentialRampToValueAtTime(990, now + 0.12);
      } else if (type === "wrong") {
        o.frequency.setValueAtTime(300, now);
        o.frequency.exponentialRampToValueAtTime(160, now + 0.18);
      } else if (type === "win") {
        o.frequency.setValueAtTime(523, now);
        o.frequency.setValueAtTime(784, now + 0.12);
        o.frequency.setValueAtTime(1046, now + 0.24);
      }
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + (type === "win" ? 0.4 : 0.25));
      o.start(now);
      o.stop(now + (type === "win" ? 0.42 : 0.28));
    } catch (e) {}
  }

  function toastBox() {
    let b = document.getElementById("toasts");
    if (!b) { b = document.createElement("div"); b.id = "toasts"; document.body.appendChild(b); }
    return b;
  }

  function toast(opts) {
    const el = document.createElement("div");
    el.className = "toast " + (opts.cls || "");
    el.innerHTML = `<span class="t-ico">${opts.ico || "✨"}</span><span><span class="t-strong">${esc(opts.strong || "")}</span>${opts.sub ? `<br><span class="t-sub">${esc(opts.sub)}</span>` : ""}</span>`;
    toastBox().appendChild(el);
    const ttl = opts.ttl || 3000;
    setTimeout(() => { el.classList.add("out"); setTimeout(() => el.remove(), 360); }, ttl);
  }

  function grantToast(g) {
    if (!g || !g.xp) return;
    toast({ ico: "⭐", strong: `+${g.xp} XP`, sub: g.coins ? `+${g.coins} монет` : "", cls: "gold", ttl: 1700 });
  }

  function mentorSay(text) {
    const old = document.getElementById("mentor-pop");
    if (old) old.remove();
    const el = document.createElement("div");
    el.id = "mentor-pop";
    el.className = "mentor-pop";
    el.innerHTML =
      `<button class="mp-close" aria-label="Закрыть">×</button>
       <div class="mp-avatar">${GAME.mentor.avatar}</div>
       <div><div class="mp-name">${esc(GAME.mentor.name)}</div><div class="mp-text">${esc(text)}</div></div>`;
    el.querySelector(".mp-close").addEventListener("click", () => { el.classList.add("out"); setTimeout(() => el.remove(), 360); });
    document.body.appendChild(el);
    clearTimeout(mentorSay._t);
    mentorSay._t = setTimeout(() => { if (el.parentNode) { el.classList.add("out"); setTimeout(() => el.remove(), 360); } }, 8000);
  }

  function enqueueCelebrate(data) { celebrateQueue.push(data); if (!overlayShown) showNextCelebrate(); }

  function showNextCelebrate() {
    if (!celebrateQueue.length) { overlayShown = false; return; }
    overlayShown = true;
    const data = celebrateQueue.shift();
    const ov = document.createElement("div");
    ov.className = "overlay";
    ov.innerHTML =
      `<div class="celebrate">
         <div class="cel-emoji">${data.emoji}</div>
         <h2>${esc(data.title)}</h2>
         <div class="cel-sub">${esc(data.sub || "")}</div>
         <div class="cel-mentor">«${esc(data.mentor || "")}»</div>
         <button class="btn btn-primary" data-cel-close>Продолжить</button>
       </div>`;
    document.body.appendChild(ov);
    const close = () => { ov.remove(); showNextCelebrate(); };
    ov.querySelector("[data-cel-close]").addEventListener("click", close);
    ov.addEventListener("click", (e) => { if (e.target === ov) close(); });
  }

  function flushEvents() {
    const events = State.takeEvents();
    for (const e of events) {
      if (e.type === "levelup") {
        enqueueCelebrate({ emoji: "🎚️", title: `Уровень ${e.payload.level}!`, sub: e.payload.title, mentor: pick(GAME.mentor.lines.levelUp) });
        tone("win");
      } else if (e.type === "achievement") {
        toast({ ico: e.payload.icon, strong: "Достижение получено!", sub: e.payload.title, cls: "gold", ttl: 3600 });
      } else if (e.type === "topicComplete") {
        const r = e.payload.reward || {};
        toast({ ico: "🏁", strong: "Тема пройдена!", sub: r.xp ? `+${r.xp} XP, +${r.coins} монет` : "", cls: "green", ttl: 3200 });
        mentorSay(pick(GAME.mentor.lines.topicDone));
      } else if (e.type === "bossWin") {
        const t = topic(e.payload.topicId);
        enqueueCelebrate({ emoji: "👑", title: "Босс повержен!", sub: t ? t.boss.title : "", mentor: pick(GAME.mentor.lines.bossWin) });
        tone("win");
      } else if (e.type === "item") {
        toast({ ico: e.payload.icon, strong: "Получен артефакт!", sub: e.payload.name, cls: "gold", ttl: 3600 });
      } else if (e.type === "chapterComplete") {
        const r = e.payload.reward || {};
        enqueueCelebrate({
          emoji: "🏆",
          title: "Глава пройдена!",
          sub: e.payload.title + (r.xp ? ` · +${r.xp} XP, +${r.coins} монет` : ""),
          mentor: pick(GAME.mentor.lines.bossWin)
        });
        tone("win");
      }
    }
  }

  function hudHTML() {
    const hero = State.data.hero;
    const li = State.levelInfo();
    const avatar = State.equippedAvatarIcon();
    const cls = State.heroClass();
    return `
      <header class="hud">
        <div class="hud-avatar" title="${esc(cls ? cls.name : "")}">${avatar}</div>
        <div class="hud-main">
          <div class="hud-row1">
            <span class="hud-name">${esc(hero.name)}</span>
            <span class="hud-level">Ур. ${li.level}</span>
            <span class="hud-title">${esc(li.title)}</span>
          </div>
          <div class="hud-bar bar bar-xp" aria-label="Опыт">
            <div class="bar-fill" style="width:${li.percent}%"></div>
          </div>
        </div>

          <span class="hud-chip coins" title="Монеты"><span class="ico">🪙</span>${hero.coins}</span>

          <button class="hud-sound" data-act="toggle-sound" title="Звук">${State.data.settings.sound ? "🔊" : "🔇"}</button>
        </div>
      </header>`;
  }

  function updateHUD() {

    if (!old) return;
    const tmp = document.createElement("div");
    tmp.innerHTML = hudHTML();
    old.replaceWith(tmp.firstElementChild);
  }

  function tabsHTML() {
    const items = [
      { v: "adventure", ico: "📖", label: "История" },
      { v: "map", ico: "🗺️", label: "Карта" },
      { v: "grade7", ico: "📚", label: "7 класс" },
      { v: "cabinet", ico: "🔬", label: "Лаборатория" },

  }

  // ----- ЭКРАНЫ -----
  function viewPrologue() {
    const steps = GAME.prologue || [];
    if (!steps.length) { creationReady = true; return viewCreation(); }
    const i = Math.min(introStep, steps.length - 1);

        <div class="prologue-sub">Хроники научных миров</div>
        <div class="vn-stage">
          <div class="vn-portrait has-char">${newton(step.mood)}</div>
          <div class="vn-box">
            <div class="vn-name">Ньютончик</div>
            <div class="vn-text">${esc(step.text)}</div>
            <div class="vn-actions"><button class="btn btn-primary" data-act="intro-next">${last ? "Создать исследователя →" : "Дальше ▶"}</button></div>
          </div>
        </div>

  }

  function viewCreation() {
    return `
      <section class="creation">
        <div class="logo">🔬⚛️🚀</div>
        <h1>ФизМат RPG</h1>
        <p class="tagline">Прокачай знания. Открой законы Вселенной.</p>
        <div class="lore">
          <div class="lore-title">🔷 ${esc(GAME.story.title)}</div>
          ${GAME.story.intro.map(p => `<p>${esc(p)}</p>`).join("")}
          <p class="lore-motto">${esc(GAME.story.motto)}</p>

          <label>Выбери класс</label>
          <div class="class-grid">
            ${GAME.classes.map(c => `
              <button class="class-card" data-act="pick-class" data-id="${c.id}">
                <div class="cc-ico">${c.icon}</div>
                <div class="cc-name">${esc(c.name)}</div>
                <div class="cc-bonus">${esc(c.bonusText)}</div>

  function viewMap() {
    let collected = 0;
    GAME.worlds.forEach(w => {
      if (w.status !== "open") return;
      const ts = State.topicsOfWorld(w.id);
      if (ts.length && ts.every(t => State.data.progress[t.id] && State.data.progress[t.id].completed)) collected++;
    });
    const totalShards = GAME.worlds.length;
    const nodes = GAME.worlds.map(w => {
      const open = w.status === "open";
      const topics = State.topicsOfWorld(w.id);
      const done = topics.filter(t => State.data.progress[t.id] && State.data.progress[t.id].completed).length;
      const allDone = open && topics.length && done === topics.length;
      const inProgress = open && done > 0 && !allDone;
      const cls = !open ? "locked" : inProgress ? "current" : "open";
      let badge = open
        ? (allDone ? `<span class="badge done">Пройден</span>` : `<span class="badge open">Открыт</span>`)
        : `<span class="badge soon">Скоро</span>`;

        <div class="world-node ${cls}" style="--w-accent:${w.accent}">

  }

  function viewWorld() {
    const w = world(ui.worldId);
    const topics = State.topicsOfWorld(w.id);
    const rows = topics.map(t => {
      const p = State.data.progress[t.id];
      const unlocked = State.isTopicUnlocked(t.id);
      const completed = p && p.completed;
      const sd = State.topicStageDone(t.id);
      const stages = [sd.theory, sd.experiment, (sd.questions && sd.problems), sd.boss];

      return `
        <div class="topic-row ${cls}" ${unlocked ? `data-act="open-topic" data-id="${t.id}"` : `data-act="locked-topic"`}>

    }).join("");

      <div class="crumbs">

  }

  function viewTopic() {
    const t = topic(ui.topicId);

    const w = world(t.worldId);
    const p = State.ensureTopic(t.id);
    const sd = State.topicStageDone(t.id);
    const stages = [
      { id: "theory", step: "Этап 1", ico: "🔍", name: "Изучение", done: sd.theory },
      { id: "experiment", step: "Этап 2", ico: "🧪", name: "Эксперимент", done: sd.experiment },
      { id: "training", step: "Этап 3", ico: "⚔️", name: "Испытание", done: sd.questions && sd.problems },
      { id: "boss", step: "Этап 4", ico: "🌋", name: "Прорыв", done: sd.boss }
    ];
    const tracker = `<div class="stages">${stages.map(s =>
      `<button class="stage-tab ${ui.stage === s.id ? "active" : ""} ${s.done ? "done" : ""}" data-act="stage" data-stage="${s.id}">
         <span class="st-step">${s.step}</span><span class="st-ico">${s.ico}</span><span class="st-name">${s.name}</span>
       </button>`).join("")}</div>`;
    let body = "";

    else if (ui.stage === "experiment") body = stageExperiment(t, p);
    else if (ui.stage === "training") body = stageTraining(t, p);

    return `
      <div class="crumbs">
        <a data-act="go" data-view="map">Карта</a><span class="sep">›</span>
        <a data-act="go" data-view="world" data-id="${w.id}">${esc(w.name)}</a><span class="sep">›</span>
        <span>${esc(t.title)}</span>
      </div>
      <div class="console-head">
        <div class="ch-ico">${t.questEmoji || t.icon}</div>
        <div><h2>${esc(t.quest || t.title)}</h2><div class="ch-tag">${esc(t.title)} · ${esc(t.tagline)}</div></div>
      </div>
      ${tracker}
      ${body}`;
  }

  function stageTheory(t, p) {
    const cards = t.theory.map((c, i) => `
      <div class="flip ${p.theory[i] ? "read" : ""}" data-act="flip" data-card="${i}">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            <div class="tf-emoji">${c.emoji}</div>

  function stageExperiment(t, p) {
    const ex = t.experiment;
    const done = p.experiment;
    const steps = ex.steps.map(s => `<li>${esc(s)}</li>`).join("");
    let predictBlock;
    if (done) {
      predictBlock = `
        <div class="feedback ok"><span class="fb-ico">✅</span>
          <div><b>Эксперимент пройден.</b> ${esc(ex.predict.explain)}</div></div>`;
    } else {
      const opts = ex.predict.options.map((o, i) => {
        const fb = ui.fb["predict"];
        const wrong = fb && fb.choice === i;
        return `<button class="option ${wrong ? "wrong" : ""}" data-act="answer-predict" data-idx="${i}">${esc(o)}</button>`;
      }).join("");
      const fb = ui.fb["predict"];
      const fbBlock = fb ? `<div class="feedback no"><span class="fb-ico">🤔</span><div>Не совсем. Попробуй ещё раз.</div></div>` : "";
      predictBlock = `
        <div class="q-text">${esc(ex.predict.q)}</div>
        <div class="options">${opts}</div>${fbBlock}`;
    }
    return `
      <div class="panel">
        <h3>🧪 ${esc(ex.title)}</h3>
        <p class="panel-intro">${esc(ex.intro)}</p>
        <ol class="exp-steps">${steps}</ol>
        <div class="exp-insight">🔎 ${esc(ex.insight)}</div>
        ${predictBlock}
      </div>`;
  }

  function stageTraining(t, p) {
    const qDone = p.questions.filter(Boolean).length;
    const pDone = p.problems.filter(Boolean).length;
    const quiz = t.questions.map((q, i) => {
      const answered = p.questions[i];
      const fb = ui.fb["q:" + i];
      const opts = q.options.map((o, oi) => {
        let c = "";
        if (answered) c = oi === q.correct ? "correct" : "";
        else if (fb && fb.choice === oi) c = "wrong";
        return `<button class="option ${c}" ${answered ? "disabled" : ""} data-act="answer-q" data-q="${i}" data-idx="${oi}">${esc(o)}</button>`;
      }).join("");
      let feedback = "";
      if (answered) feedback = `<div class="feedback ok"><span class="fb-ico">✅</span><div>${esc(q.explain)}</div></div>`;
      else if (fb) feedback = `<div class="feedback no"><span class="fb-ico">💡</span><div>${esc(q.explain)} Попробуй ещё раз.</div></div>`;
      return `
        <div class="panel" style="margin-bottom:12px">
          <div class="q-progress">Вопрос ${i + 1} из ${t.questions.length}</div>
          <div class="q-text">${esc(q.q)}</div>
          <div class="options">${opts}</div>${feedback}
        </div>`;
    }).join("");
    const probs = t.problems.map((pr, i) => {
      const solved = p.problems[i];
      const fb = ui.fb["p:" + i];
      let inner;
      if (solved) {
        inner = `
          <div class="answer-row"><input value="${pr.answer}" disabled><span class="unit">${esc(pr.unit || "")}</span>
            <span class="badge done">✓ Решено</span></div>
          <div class="solution">📘 ${esc(pr.solution)}</div>`;
      } else {
        const fbBlock = fb ? `<div class="feedback no"><span class="fb-ico">🤔</span><div>Пока неверно. Проверь вычисления и попробуй ещё раз.</div></div>` : "";
        inner = `
          <div class="answer-row">
            <input id="inp-p-${i}" type="text" inputmode="decimal" placeholder="Ответ" autocomplete="off">
            <span class="unit">${esc(pr.unit || "")}</span>
            <button class="btn btn-primary btn-sm" data-act="check-problem" data-idx="${i}">Проверить</button>
          </div>${fbBlock}`;
      }
      return `
        <div class="panel" style="margin-bottom:12px">
          <div class="q-progress">Задача ${i + 1} из ${t.problems.length}</div>
          <div class="q-text">${esc(pr.q)}</div>${inner}
        </div>`;
    }).join("");
    return `
      <div class="panel" style="background:transparent;border:none;padding:0;margin-bottom:8px">
        <h3>🎯 Тренировка</h3>
        <p class="panel-intro">Вопросы: ${qDone}/${t.questions.length} · Задачи: ${pDone}/${t.problems.length}</p>
      </div>
      ${quiz}
      <div class="screen-head" style="margin:18px 0 10px"><h3 style="font-size:18px">🧮 Задачи</h3></div>
      ${probs}`;
  }

  function cabProgram() {
    const grades = [
      { g: 7, title: "7 класс", note: "Введение, механика, давление, работа" },
      { g: 8, title: "8 класс", note: "Тепловые и электрические явления" },
      { g: 9, title: "9 класс", note: "Динамика, тяготение, космос" }
    ];
    const chItem = (c) => {
      const done = State.isChapterDone(c.id);
      const lock = (c.status !== "open") || (c.requires && !State.isChapterDone(c.requires));
      const tag = done ? "✓ пройдена" : (lock ? "🔒 история" : "история");
      const actAttr = lock ? `data-act="go" data-view="adventure"` : `data-act="adv-start" data-ch="${c.id}"`;
      return `<button class="prog-item ch" ${actAttr}>${c.icon} ${esc(c.title)} <span class="prog-tag">${tag}</span></button>`;
    };
    const tpItem = (t) => `<button class="prog-item" data-act="open-topic" data-id="${t.id}">${t.questEmoji || t.icon} ${esc(t.quest || t.title)} <span class="prog-tag">${esc(t.title)}</span></button>`;
    const blocks = grades.map(gr => {
      const chs = (GAME.chapters || []).filter(c => c.grade === gr.g);
      const tps = (GAME.topics || []).filter(t => t.grade === gr.g);
      const chHTML = chs.length ? `<div class="prog-sub">Истории:</div>${chs.map(chItem).join("")}` : "";
      const tpHTML = tps.length ? `<div class="prog-sub">Темы:</div>${tps.map(tpItem).join("")}` : "";
      return `<div class="prog-grade">
          <div class="prog-head"><b>${gr.title}</b> · ${esc(gr.note)}</div>
          ${chHTML}${tpHTML}
        </div>`;
    }).join("");
    const math = (GAME.topics || []).filter(t => t.grade === "math");
    const mathBlock = math.length
      ? `<div class="prog-grade"><div class="prog-head"><b>Математика</b> · подготовка к ОГЭ</div><div class="prog-sub">Практика по темам:</div>${math.map(tpItem).join("")}</div>`
      : "";
    return `
      <div class="prog-intro">📚 Все темы по классам.</div>
      ${blocks}${mathBlock}`;
  }

    if (m === "happy") {
      brows = `<path d="M34 28 Q38.5 26 43 28" /><path d="M57 28 Q61.5 26 66 28" />`;
      eyes = `<path d="M37 43 Q41 39 45 43" stroke="${line}" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M55 43 Q59 39 63 43" stroke="${line}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
      mouth = `<path d="M42 52 Q50 61 58 52" stroke="${line}" stroke-width="2.6" fill="none" stroke-linecap="round"/>`;
    } else if (m === "surprised") {
      brows = `<path d="M34 26 Q38.5 23 43 26" /><path d="M57 26 Q61.5 23 66 26" />`;
      eyes = `<circle cx="41" cy="42" r="3.2" fill="${line}"/><circle cx="59" cy="42" r="3.2" fill="${line}"/>`;
      mouth = `<ellipse cx="50" cy="55" rx="3.6" ry="4.6" fill="${line}"/>`;
      extra = `<text x="75" y="24" font-family="Russo One, sans-serif" font-size="14" fill="${frame}">!</text>`;
    } else if (m === "thinking") {
      brows = `<path d="M34 31 Q38.5 30 43 31" /><path d="M57 28 Q61.5 26 66 28" />`;
      eyes = `<circle cx="42" cy="39" r="2.4" fill="${line}"/><circle cx="60" cy="39" r="2.4" fill="${line}"/>`;
      mouth = `<path d="M45 55 Q50 53 55 55" stroke="${line}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
      extra = `<text x="74" y="26" font-family="Russo One, sans-serif" font-size="13" fill="${frame}">?</text>`;
    } else if (m === "worried") {
      brows = `<path d="M34 31 Q38.5 28 43 30" /><path d="M57 30 Q61.5 28 66 31" />`;
      eyes = `<circle cx="41" cy="42" r="2.5" fill="${line}"/><circle cx="59" cy="42" r="2.5" fill="${line}"/>`;
      mouth = `<path d="M44 56 Q47 53 50 56 Q53 59 56 56" stroke="${line}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
    } else {
      brows = `<path d="M34 30 Q38.5 28 43 30" /><path d="M57 30 Q61.5 28 66 30" />`;
      eyes = `<circle cx="41" cy="42" r="2.6" fill="${line}"/><circle cx="59" cy="42" r="2.6" fill="${line}"/>`;
      mouth = `<path d="M44 53 Q50 58 56 53" stroke="${line}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
    }
    return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="newton-svg">
      <path d="M20 100 V86 C20 74 30 70 40 68 L60 68 C70 70 80 74 80 86 V100 Z" fill="${coat}" stroke="${coatShade}" stroke-width="1.5"/>
      <path d="M41 68 L50 80 L59 68" fill="none" stroke="${frame}" stroke-width="3" stroke-linejoin="round"/>
      <path d="M50 80 l-3.2 7 3.2 8 3.2 -8 Z" fill="${frame}"/>
      <rect x="46" y="57" width="8" height="12" rx="3" fill="${skinShade}"/>
      <ellipse cx="50" cy="40" rx="20" ry="21" fill="${skin}"/>
      <circle cx="30" cy="42" r="3.4" fill="${skin}"/><circle cx="70" cy="42" r="3.4" fill="${skin}"/>
      <path d="M30 36 C30 18 40 14 50 14 C60 14 70 18 70 36 C64 27 57 29 53 31 C50 24 44 24 41 31 C37 29 34 28 30 36 Z" fill="${hair}"/>
      <g stroke="${hair}" stroke-width="2.5" fill="none" stroke-linecap="round">${brows}</g>
      <circle cx="41" cy="42" r="8" fill="${lens}" fill-opacity="0.5" stroke="${frame}" stroke-width="2.5"/>
      <circle cx="59" cy="42" r="8" fill="${lens}" fill-opacity="0.5" stroke="${frame}" stroke-width="2.5"/>
      <line x1="49" y1="42" x2="51" y2="42" stroke="${frame}" stroke-width="2.5"/>
      <path d="M33 40 l-4 -1" stroke="${frame}" stroke-width="2" stroke-linecap="round"/>
      <path d="M67 40 l4 -1" stroke="${frame}" stroke-width="2" stroke-linecap="round"/>
      ${eyes}
      ${mouth}
      ${extra}
    </svg>`;
  }

  function viewAdventure() {
    const chs = GAME.chapters || [];
    const cards = chs.map(c => {
      const soon = c.status !== "open";
      const reqLock = c.requires && !State.isChapterDone(c.requires);
      const done = State.isChapterDone(c.id);
      const started = State.data.adventure.current === c.id && (State.data.adventure.scene || 0) > 0 && !done;
      const cls = (soon || reqLock) ? "locked" : done ? "done" : "open";
      let act;
      if (soon) {
        act = `<span class="ch-soon">🔒 Скоро</span>`;
      } else if (reqLock) {
        const prev = chapter(c.requires);
        act = `<span class="ch-soon">🔒 Сначала: ${esc(prev ? prev.title : "предыдущая глава")}</span>`;
      } else {
        const label = done ? "Пройти заново" : (started ? "Продолжить" : "Играть");
        act = `<button class="btn btn-primary btn-sm" data-act="adv-start" data-ch="${c.id}">${label} ▶</button>`;
      }
      return `
        <div class="ch-card ${cls}" style="--w-accent:${c.accent || "#38e1ff"}">
          <div class="ch-ico">${c.icon}</div>
          <div class="ch-body">
            <div class="ch-sub">${esc(c.subtitle || "")}</div>
            <div class="ch-title">${esc(c.title)}${done ? ` <span class="ch-done">✓</span>` : ""}</div>
            <div class="ch-blurb">${esc(c.blurb || "")}</div>
          </div>
          <div class="ch-act">${act}</div>
        </div>`;
    }).join("");
    return `
      <div class="screen-head">
        <h2>📖 Хроники научных миров</h2>
        <div class="sub">Случился Научный хаос — законы исчезают из миров.</div>
      </div>
      <div class="ch-list">${cards}</div>`;
  }

  function viewScene() {
    const ch = chapter(ui.chId);
    if (!ch || !ch.scenes || !ch.scenes.length) {
      return `<div class="screen-head"><h2>История</h2></div>
        <div class="vn-empty">Глава недоступна. <a data-act="go" data-view="adventure">← Вернуться к главам</a></div>`;
    }
    let idx = State.sceneIndex(ch.id);
    if (idx >= ch.scenes.length) idx = ch.scenes.length - 1;
    const sc = ch.scenes[idx];
    if (!sc) return `<div class="vn-empty">Сцена не найдена.</div>`;
    const isNewton = sc.type !== "boss" && (sc.speaker === "Ньютончик" || sc.speaker === GAME.mentor.name);
    const portrait = isNewton ? newton(sc.mood) : (sc.emoji || GAME.mentor.avatar);
    const portraitCls = isNewton ? "vn-portrait has-char" : "vn-portrait";
    const name = sc.type === "boss" ? (sc.title || "Испытание") : (sc.speaker || GAME.mentor.name);
    const mainText = sc.type === "boss" ? sc.story : (sc.type === "practice" ? sc.intro : sc.text);
    let body = "";
    if (sc.type === "line") body = sceneLine(sc);
    else if (sc.type === "concept") body = sceneConcept(sc);
    else if (sc.type === "practice") body = scenePractice(sc);
    else if (sc.type === "boss") body = sceneBoss(sc, ch);
    return `
      <div class="scene" style="--w-accent:${ch.accent || "#38e1ff"}">
        <div class="vn-top">
          <a class="vn-back" data-act="go" data-view="adventure">← К главам</a>
          <span class="vn-progress">${esc(ch.title)} · сцена ${idx + 1} из ${ch.scenes.length}</span>
        </div>
        <div class="vn-stage">
          <div class="${portraitCls}">${portrait}</div>
          <div class="vn-box">
            <div class="vn-name">${esc(name)}</div>
            ${mainText ? `<div class="vn-text">${esc(mainText)}</div>` : ""}
            ${body}
          </div>
        </div>
      </div>`;
  }

  function sceneLine(sc) {
    if (sc.choices && sc.choices.length) {
      const opts = sc.choices.map((o, i) => {
        const label = typeof o === "string" ? o : o.text;
        return `<button class="vn-choice" data-act="scene-choice" data-idx="${i}">${esc(label)}</button>`;
      }).join("");
      return `<div class="vn-choices">${opts}</div>`;
    }
    return `<div class="vn-actions"><button class="btn btn-primary" data-act="scene-next">Дальше ▶</button></div>`;
  }

  function sceneConcept(sc) {
    const fb = ui.fb.concept || {};
    const solved = !!fb.solved;
    const opts = sc.options.map((o, i) => {
      let c = "";
      if (solved && i === sc.correct) c = "correct";
      else if (!solved && fb.wrong === i) c = "wrong";
      return `<button class="option ${c}" ${solved ? "disabled" : ""} data-act="scene-concept" data-idx="${i}">${esc(o)}</button>`;
    }).join("");
    let feed = "";
    if (solved) feed = `<div class="vn-feedback ok"><b>✔ </b>${esc(sc.explain)}</div>`;
    else if (fb.wrong != null) feed =
      `<div class="vn-feedback bad"><span class="vn-mini-name">${esc(GAME.mentor.name)}:</span> ${esc(sc.analysis[fb.wrong] || "Подумай ещё раз.")}</div>`;
    const next = solved ? `<div class="vn-actions"><button class="btn btn-primary" data-act="scene-next">Дальше ▶</button></div>` : "";
    return `<div class="vn-q">${esc(sc.q)}</div><div class="options">${opts}</div>${feed}${next}`;
  }

  function scenePractice(sc) {
    const itemsHTML = sc.items.map((it, i) => {
      const f = ui.fb["it:" + i] || {};
      const solved = !!f.solved;
      let inner = "";
      if (it.kind === "mc") {
        inner = `<div class="options">${it.options.map((o, oi) => {
          let c = "";
          if (solved && oi === it.correct) c = "correct";
          else if (!solved && f.wrong === oi) c = "wrong";
          return `<button class="option ${c}" ${solved ? "disabled" : ""} data-act="scene-practice" data-i="${i}" data-kind="mc" data-idx="${oi}">${esc(o)}</button>`;
        }).join("")}</div>`;
      } else {
        inner = `<div class="answer-row">
            <input id="inp-sc-${i}" class="num-input" type="text" inputmode="decimal" autocomplete="off" placeholder="Ответ" ${solved ? "disabled" : ""} value="${solved && f.val != null ? esc(f.val) : ""}">
            ${it.unit ? `<span class="unit">${esc(it.unit)}</span>` : ""}
            ${solved ? `<span class="ok-badge">✓</span>` : `<button class="btn btn-primary btn-sm" data-act="scene-practice" data-i="${i}" data-kind="num">Проверить</button>`}
          </div>`;
      }
      let sol = "";
      if (solved) sol = `<div class="vn-feedback ok"><b>✔ </b>${esc(it.solution || "")}</div>`;
      else if (f.wrong != null) sol = `<div class="vn-feedback bad">Пока не сходится — проверь формулу и единицы, попробуй ещё.</div>`;
      return `<div class="task-card ${solved ? "solved" : ""}">
          <div class="task-q">${esc(it.q)}</div>
          ${it.svg ? `<div class="task-svg">${it.svg}</div>` : ""}
          ${inner}${sol}
        </div>`;
    }).join("");
    const allSolved = sc.items.every((_, i) => ui.fb["it:" + i] && ui.fb["it:" + i].solved);
    const next = allSolved
      ? `<div class="vn-actions"><span class="vn-done">✓ Калибровка завершена</span><button class="btn btn-primary" data-act="scene-next">Дальше ▶</button></div>`
      : "";
    return `<div class="vn-practice">${sc.title ? `<div class="vn-ptitle">${esc(sc.title)}</div>` : ""}${itemsHTML}</div>${next}`;
  }

  function sceneBoss(sc, ch) {
    const fb = ui.fb.boss || {};
    if (fb.solved) {
      const law = (GAME.discoveries || []).find(d => d.chapterId === ch.id)
        || (GAME.discoveries || []).find(d => d.topicId === ch.topicId);
      const lawLine = law ? `<div class="vn-lawget">📓 Открытие: <b>${esc(law.formula)}</b></div>` : "";
      const ot = ch.outro || {};
      return `
        <div class="vn-feedback ok"><b>🏆 </b>${esc(sc.solution || "")}</div>
        ${lawLine}
        <div class="vn-outro">
          <div class="vn-outro-title">${esc(ot.title || "Глава пройдена!")}</div>
          <div class="vn-outro-sub">${esc(ot.sub || "Ты восстановил ещё одну часть Источника.")}</div>
          <div class="vn-actions">
            <button class="btn btn-primary" data-act="go" data-view="adventure">К списку глав</button>
            ${ch.topicId ? `<button class="btn btn-ghost" data-act="open-topic" data-id="${esc(ch.topicId)}">Тренировка по теме</button>` : ""}
          </div>
        </div>`;
    }
    const hintHTML = fb.wrong != null
      ? `<div class="vn-feedback bad"><span class="vn-mini-name">${esc(GAME.mentor.name)}:</span> ${esc(sc.hint || "Пересчитай внимательно.")}</div>`
      : "";
    if (sc.options) {
      const opts = sc.options.map((o, i) => {
        const c = (fb.wrong === i) ? "wrong" : "";
        return `<button class="option ${c}" data-act="scene-boss-mc" data-idx="${i}">${esc(o)}</button>`;
      }).join("");
      return `<div class="boss-panel"><div class="vn-q">${esc(sc.q)}</div><div class="options">${opts}</div>${hintHTML}</div>`;
    }
    return `
      <div class="boss-panel">
        <div class="vn-q">${esc(sc.q)}</div>
        <div class="answer-row">
          <input id="inp-sboss" class="num-input" type="text" inputmode="decimal" autocomplete="off" placeholder="Ответ">
          ${sc.unit ? `<span class="unit">${esc(sc.unit)}</span>` : ""}
          <button class="btn btn-gold" data-act="scene-boss-check">⚔️ Запустить</button>
        </div>
        ${hintHTML}
      </div>`;
  }

  // ----- РЕНДЕР -----
  function render() {
    if (!State.data.hero) {
      root.innerHTML = creationReady ? viewCreation() : viewPrologue();
      window.scrollTo(0, 0);
      return;
    }
    let screen = "";
    if (ui.view === "adventure") screen = viewAdventure();
    else if (ui.view === "scene") screen = viewScene();
    else if (ui.view === "map") screen = viewMap();
    else if (ui.view === "world") screen = viewWorld();
    else if (ui.view === "grade7") screen = viewGrade7();
    else if (ui.view === "topic") screen = viewTopic();
    else if (ui.view === "cabinet") screen = viewCabinet();
    else if (ui.view === "shop") screen = viewShop();
    else if (ui.view === "teacher") screen = viewTeacher();
    root.innerHTML = hudHTML() + tabsHTML() + `<main class="screen">${screen}</main>`;
  }

  function go(view, opts) {
    ui.view = view;
    if (opts && opts.worldId) ui.worldId = opts.worldId;
    if (opts && opts.topicId) ui.topicId = opts.topicId;
    if (view === "topic") { ui.stage = "theory"; ui.fb = {}; }
    render();
    window.scrollTo(0, 0);
  }

  // ----- ОБРАБОТЧИКИ СОБЫТИЙ -----
  root.addEventListener("click", (e) => {
    const node = e.target.closest("[data-act]");
    if (!node) return;
    const act = node.getAttribute("data-act");

    if (act === "pick-class") {
      selectedClass = node.getAttribute("data-id");
      root.querySelectorAll(".class-card").forEach(c => c.classList.remove("selected"));
      node.classList.add("selected");
      return;
    }

    if (act === "create-hero") {
      const input = document.getElementById("hero-name");
      const name = (input.value || "").trim();
      if (!name) { input.focus(); input.style.borderColor = "var(--reaction-pink)"; toast({ ico: "✍️", strong: "Введи имя героя", cls: "pink" }); return; }
      if (!selectedClass) { toast({ ico: "🧭", strong: "Выбери класс героя", cls: "pink" }); return; }
      State.createHero(name, selectedClass);
      setAccent();
      go("adventure");
      setTimeout(() => { mentorSay(pick(GAME.mentor.lines.greet)); greeted = true; }, 500);
      return;
    }

    if (act === "intro-next") {
      introStep++;
      if (introStep >= (GAME.prologue || []).length) creationReady = true;
      render();
      window.scrollTo(0, 0);
      return;
    }

    if (act === "intro-skip") { creationReady = true; render(); window.scrollTo(0, 0); return; }

    if (act === "go") { go(node.getAttribute("data-view"), { worldId: node.getAttribute("data-id"), topicId: node.getAttribute("data-id") }); return; }

    if (act === "toggle-sound") { State.toggleSound(); if (State.data.settings.sound) tone("correct"); updateHUD(); return; }

    if (act === "open-world") { go("world", { worldId: node.getAttribute("data-id") }); return; }
    if (act === "locked-world") { toast({ ico: "🔒", strong: "Мир скоро откроется", ttl: 2600 }); return; }

    if (act === "open-topic") { go("topic", { topicId: node.getAttribute("data-id") }); State.markStarted(ui.topicId); return; }
    if (act === "locked-topic") { toast({ ico: "🔒", strong: "Тема закрыта", sub: "Сначала пройди предыдущую тему", ttl: 2600 }); return; }

    if (act === "stage") { ui.stage = node.getAttribute("data-stage"); ui.fb = {}; render(); window.scrollTo(0, 0); return; }
    if (act === "cab") { ui.cab = node.getAttribute("data-tab"); render(); window.scrollTo(0, 0); return; }

    if (act === "adv-start") {
      const chId = node.getAttribute("data-ch");
      const ch = chapter(chId);
      if (!ch || ch.status !== "open") { toast({ ico: "🔒", strong: "Глава скоро откроется", ttl: 2400 }); return; }
      if (ch.requires && !State.isChapterDone(ch.requires)) {
        const prev = chapter(ch.requires);
        toast({ ico: "🔒", strong: "Сначала пройди предыдущую главу", sub: prev ? prev.title : "", ttl: 2600 });
        return;
      }
      ui.chId = chId;
      ui.fb = {};
      State.startChapter(chId);
      go("scene");
      return;
    }

    if (act === "scene-next") { ui.fb = {}; State.advanceScene(ui.chId); render(); window.scrollTo(0, 0); return; }

    if (act === "scene-choice") {
      const ch = chapter(ui.chId);
      const sc = ch.scenes[State.sceneIndex(ui.chId)];
      const opt = sc && sc.choices ? sc.choices[+node.getAttribute("data-idx")] : null;
      if (opt && typeof opt === "object" && opt.style) {
        State.recordStyle(opt.style);
        const ack = {
          experiment: "Люблю проверять руками! Отличный подход.",
          formula: "Сначала теория — мыслишь как настоящий учёный.",
          risk: "Смелость тоже ведёт к открытиям. Проверим!"
        };
        mentorSay(ack[opt.style] || "Принято!");
        tone("correct");
      }
      ui.fb = {};
      State.advanceScene(ui.chId);
      render();
      window.scrollTo(0, 0);
      return;
    }

    if (act === "scene-concept") {
      const ch = chapter(ui.chId);
      const sc = ch.scenes[State.sceneIndex(ui.chId)];
      if (ui.fb.concept && ui.fb.concept.solved) return;
      const idx = +node.getAttribute("data-idx");
      if (idx === sc.correct) {
        ui.fb.concept = { solved: true };
        const g = State.awardStory(20, 5, "question");
        flushEvents();
        updateHUD();
        grantToast(g);
        tone("correct");
      } else {
        ui.fb.concept = { wrong: idx };
        tone("wrong");
      }
      render();
      return;
    }

    if (act === "scene-practice") {
      const ch = chapter(ui.chId);
      const sc = ch.scenes[State.sceneIndex(ui.chId)];
      const i = +node.getAttribute("data-i");
      const kind = node.getAttribute("data-kind");
      const it = sc.items[i];
      const key = "it:" + i;
      if (ui.fb[key] && ui.fb[key].solved) return;
      let correct = false, val = null;
      if (kind === "num") {
        const inp = document.getElementById("inp-sc-" + i);
        val = inp ? inp.value : "";
        correct = checkNum(parseNum(val), it.answer, it.tol);
      } else {
        const oi = +node.getAttribute("data-idx");
        correct = oi === it.correct;
        if (!correct) ui.fb[key] = { wrong: oi };
      }
      if (correct) {
        ui.fb[key] = { solved: true, val: kind === "num" ? val : null };
        const r = sc.reward || { xp: 30, coins: 10 };
        const g = State.awardStory(r.xp, r.coins, "problem");
        flushEvents();
        updateHUD();
        grantToast(g);
        tone("correct");
      } else {
        if (kind === "num") ui.fb[key] = { wrong: true };
        tone("wrong");
      }
      render();
      return;
    }

    if (act === "scene-boss-check") {
      const ch = chapter(ui.chId);
      const sc = ch.scenes[State.sceneIndex(ui.chId)];
      const inp = document.getElementById("inp-sboss");
      const correct = checkNum(parseNum(inp ? inp.value : ""), sc.answer, sc.tol);
      if (correct) {
        ui.fb.boss = { solved: true };
        State.completeChapter(ui.chId);
        flushEvents();
        updateHUD();
        tone("win");
      } else {
        ui.fb.boss = { wrong: true };
        mentorSay(sc.hint || pick(GAME.mentor.lines.wrong));
        tone("wrong");
      }
      render();
      return;
    }

    if (act === "scene-boss-mc") {
      const ch = chapter(ui.chId);
      const sc = ch.scenes[State.sceneIndex(ui.chId)];
      const idx = +node.getAttribute("data-idx");
      if (idx === sc.correct) {
        ui.fb.boss = { solved: true };
        State.completeChapter(ui.chId);
        flushEvents();
        updateHUD();
        tone("win");
      } else {
        ui.fb.boss = { wrong: idx };
        mentorSay(sc.hint || pick(GAME.mentor.lines.wrong));
        tone("wrong");
      }
      render();
      return;
    }

    if (act === "flip") {
      const card = node;
      card.classList.toggle("flipped");
      const i = +card.getAttribute("data-card");
      if (card.classList.contains("flipped")) {
        const g = State.readTheoryCard(ui.topicId, i);
        if (g) { card.classList.add("read"); flushEvents(); updateHUD(); grantToast(g); tone("correct"); }
      }
      return;
    }

    if (act === "answer-predict") {
      const t = topic(ui.topicId);
      const idx = +node.getAttribute("data-idx");
      const correct = idx === t.experiment.predict.correct;
      if (correct) { delete ui.fb["predict"]; const g = State.doExperiment(t.id); flushEvents(); updateHUD(); grantToast(g); tone("correct"); }
      else { ui.fb["predict"] = { choice: idx }; tone("wrong"); }
      render();
      return;
    }

    if (act === "answer-q") {
      const t = topic(ui.topicId);
      const qi = +node.getAttribute("data-q");
      const oi = +node.getAttribute("data-idx");
      const correct = oi === t.questions[qi].correct;
      const res = State.answerQuestion(t.id, qi, correct);
      if (correct) { delete ui.fb["q:" + qi]; flushEvents(); updateHUD(); grantToast(res); tone("correct"); }
      else { ui.fb["q:" + qi] = { choice: oi }; tone("wrong"); }
      render();
      return;
    }

    if (act === "check-problem") {
      const t = topic(ui.topicId);
      const i = +node.getAttribute("data-idx");
      const inp = document.getElementById("inp-p-" + i);
      const val = parseNum(inp ? inp.value : "");
      const pr = t.problems[i];
      const correct = checkNum(val, pr.answer, pr.tol);
      const res = State.solveProblem(t.id, i, correct);
      if (correct) { delete ui.fb["p:" + i]; flushEvents(); updateHUD(); grantToast(res); tone("correct"); }
      else { ui.fb["p:" + i] = { wrong: true }; tone("wrong"); }
      render();
      return;
    }

    if (act === "check-boss") {
      const t = topic(ui.topicId);
      const inp = document.getElementById("inp-boss");
      const val = parseNum(inp ? inp.value : "");
      const correct = checkNum(val, t.boss.answer, t.boss.tol);
      const res = State.defeatBoss(t.id, correct);
      if (correct) { delete ui.fb["boss"]; flushEvents(); updateHUD(); tone("win"); }
      else { ui.fb["boss"] = { wrong: true }; mentorSay(pick(GAME.mentor.lines.wrong)); tone("wrong"); }
      render();
      return;
    }

    if (act === "buy-avatar") { if (State.buyAvatar(node.getAttribute("data-id"))) { toast({ ico: "🛒", strong: "Покупка совершена!", cls: "green" }); updateHUD(); render(); } return; }
    if (act === "equip-avatar") { State.equipAvatar(node.getAttribute("data-id")); updateHUD(); render(); return; }
    if (act === "buy-accent") { if (State.buyAccent(node.getAttribute("data-id"))) { toast({ ico: "🎨", strong: "Цвет разблокирован!", cls: "green" }); setAccent(); updateHUD(); render(); } return; }
    if (act === "equip-accent") { State.equipAccent(node.getAttribute("data-id")); setAccent(); updateHUD(); render(); return; }
  });

  root.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const id = e.target.id || "";
    if (id.indexOf("inp-p-") === 0) { const i = id.slice(6); const btn = root.querySelector(`[data-act="check-problem"][data-idx="${i}"]`); if (btn) btn.click(); }
    else if (id.indexOf("inp-sc-") === 0) { const i = id.slice(7); const btn = root.querySelector(`[data-act="scene-practice"][data-i="${i}"][data-kind="num"]`); if (btn) btn.click(); }
    else if (id === "inp-sboss") { const btn = root.querySelector(`[data-act="scene-boss-check"]`); if (btn) btn.click(); }
    else if (id === "inp-boss") { const btn = root.querySelector(`[data-act="check-boss"]`); if (btn) btn.click(); }
    else if (id === "hero-name") { const btn = root.querySelector(`[data-act="create-hero"]`); if (btn) btn.click(); }
  });

  // ============================================================
  // ЗАПУСК
  // ============================================================
  State.load();
  setAccent();
  if (State.data.hero) {
    ui.view = "adventure";
    render();
    if (!greeted) {
      setTimeout(() => { mentorSay(pick(GAME.mentor.lines.greet)); greeted = true; }, 600);
    }
  } else {
    render();
  }

  window.FizMatApp = { ui, render, reset: () => { State.reset(); selectedClass = null; greeted = false; introStep = 0; creationReady = false; setAccent(); render(); } };
})();

</script>
</body>
</html>
