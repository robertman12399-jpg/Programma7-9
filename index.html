/* ============================================================
   ФизМат RPG — style.css
   Дизайн: «командная консоль / звёздная карта».
   Стиль = RPG + научная фантастика + лаборатория + космос.
   Цвета мира и акцент героя подставляются через CSS-переменные
   (--accent задаётся из app.js по выбранному цвету в Лавке).
   ============================================================ */

/* ---------- 1. Палитра и токены ---------- */
:root {
  --space-void:   #0a0a1f;   /* глубокий фон */
  --space-deep:   #12122e;   /* панели */
  --space-panel:  #181a3a;   /* карточки */
  --space-line:   #2a2d55;   /* границы */
  --plasma-cyan:  #38e1ff;   /* основной акцент */
  --quantum-violet:#a06bff;  /* вторичный */
  --star-gold:    #ffd166;   /* опыт и монеты */
  --reaction-pink:#ff5d8f;   /* босс, опасность */
  --bio-green:    #4ade80;   /* верно */
  --text:         #eef1ff;
  --muted:        #9aa0c7;
  --text-dim:     #6f76a3;

  /* динамические — меняются из app.js */
  --accent:       #38e1ff;
  --accent-2:     #a06bff;

  --radius:   16px;
  --radius-s: 10px;
  --shadow:   0 10px 40px rgba(0,0,0,.45);
  --glow:     0 0 18px rgba(56,225,255,.45);
  --maxw:     920px;
  --font-display: "Russo One", "Segoe UI", system-ui, sans-serif;
  --font-body:    "Rubik", "Segoe UI", system-ui, -apple-system, sans-serif;
}

/* ---------- 2. База ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--space-void);
  background-image:
    radial-gradient(1200px 700px at 80% -10%, rgba(160,107,255,.18), transparent 60%),
    radial-gradient(900px 600px at 10% 0%, rgba(56,225,255,.14), transparent 55%);
  background-attachment: fixed;
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}
/* Звёздное поле */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; will-change: transform; transition: transform .1s linear;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #fff, transparent),
    radial-gradient(1px 1px at 70% 80%, #cfe8ff, transparent),
    radial-gradient(1px 1px at 40% 60%, #fff, transparent),
    radial-gradient(2px 2px at 85% 25%, #fff, transparent),
    radial-gradient(1px 1px at 55% 15%, #b9c7ff, transparent),
    radial-gradient(1px 1px at 10% 85%, #fff, transparent),
    radial-gradient(1px 1px at 90% 65%, #fff, transparent);
  opacity: .5;
  animation: twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle { from { opacity:.32 } to { opacity:.6 } }

h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 400; letter-spacing:.3px; margin:0 0 .4em; }
a { color: var(--accent); }
button { font-family: var(--font-body); cursor: pointer; }
input { font-family: var(--font-body); }

.app-wrap { position: relative; z-index: 1; max-width: var(--maxw); margin: 0 auto; padding: 0 16px 120px; }

/* ---------- 3. Кнопки ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: 1px solid var(--space-line); background: var(--space-panel); color: var(--text);
  padding: 11px 18px; border-radius: var(--radius-s); font-size: 15px; font-weight: 500;
  transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
.btn:hover { transform: translateY(-1px); border-color: var(--accent); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #0a0a1f; border: none; font-weight: 600; box-shadow: 0 6px 22px rgba(56,225,255,.28);
}
.btn-primary:hover { box-shadow: 0 10px 30px rgba(56,225,255,.42); }
.btn-ghost { background: transparent; }
.btn-gold { background: linear-gradient(135deg, var(--star-gold), #ffb02e); color:#241a00; border:none; font-weight:600; }
.btn[disabled] { opacity:.45; cursor: not-allowed; transform:none; }
.btn-sm { padding: 7px 13px; font-size: 13px; }

:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

/* ---------- 4. HUD (верхняя панель героя) ---------- */
.hud {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 14px;
  margin: 0 -16px 20px; padding: 12px 16px;
  background: rgba(18,18,46,.86);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--space-line);
}
.hud-avatar {
  width: 52px; height: 52px; flex: 0 0 52px; border-radius: 50%;
  display: grid; place-items: center; font-size: 26px;
  background: radial-gradient(circle at 30% 25%, #20214a, #111128);
  border: 2px solid var(--accent); box-shadow: 0 0 14px var(--accent);
}
.hud-main { flex: 1; min-width: 0; }
.hud-row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.hud-name { font-family: var(--font-display); font-size: 17px; }
.hud-level {
  font-size: 12px; padding: 2px 9px; border-radius: 999px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a1f; font-weight:600;
}
.hud-title { font-size: 12px; color: var(--muted); }
.hud-bar { margin-top: 7px; }
.hud-stats { display:flex; gap: 14px; align-items:center; }
.hud-chip { display:flex; align-items:center; gap:5px; font-size:14px; font-weight:600; white-space:nowrap; }
.hud-chip .ico { font-size: 15px; }
.coins { color: var(--star-gold); }
.studied { color: var(--plasma-cyan); }
.hud-sound {
  background: transparent; border: 1px solid var(--space-line); color: var(--muted);
  width: 38px; height: 38px; border-radius: 10px; font-size: 16px; display:grid; place-items:center;
}
.hud-sound:hover { border-color: var(--accent); color: var(--text); }

/* ---------- 5. Прогресс-бары ---------- */
.bar { height: 9px; background: #0e0f24; border-radius: 999px; overflow: hidden; border: 1px solid var(--space-line); }
.bar-fill {
  height: 100%; width: 0;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 0 10px var(--accent);
}
.bar-xp .bar-fill { background: linear-gradient(90deg, var(--star-gold), #ff9f1c); box-shadow: 0 0 10px rgba(255,209,102,.6); }
.bar-label { display:flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }

/* ---------- 6. Навигация ---------- */
.tabs {
  display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap;
}
.tab {
  flex: 1; min-width: 92px;
  display:flex; flex-direction: column; align-items:center; gap:3px;
  padding: 10px 6px; border-radius: var(--radius-s);
  background: var(--space-deep); border: 1px solid var(--space-line); color: var(--muted);
  font-size: 13px; font-weight: 500; transition: all .15s ease;
}
.tab .ico { font-size: 19px; }
.tab:hover { color: var(--text); border-color: var(--accent); }
.tab.active { color: #0a0a1f; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; font-weight: 600; }

/* ---------- 7. Секции / заголовки экранов ---------- */
.screen-head { margin-bottom: 18px; }
.screen-head h2 { font-size: clamp(22px, 5vw, 30px); }
.screen-head .sub { color: var(--muted); font-size: 14px; }
.crumbs { display:flex; align-items:center; gap:8px; font-size:13px; color: var(--muted); margin-bottom: 12px; flex-wrap: wrap; }
.crumbs a { cursor:pointer; }
.crumbs .sep { color: var(--text-dim); }

/* ---------- 8. Экран создания героя ---------- */
.creation { max-width: 760px; margin: 0 auto; padding-top: 40px; text-align: center; }
.creation .logo { font-size: 46px; margin-bottom: 6px; }
.creation h1 { font-size: clamp(30px, 7vw, 46px);
  background: linear-gradient(120deg, var(--plasma-cyan), var(--quantum-violet) 60%, var(--star-gold));
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.creation .tagline { color: var(--muted); font-size: 16px; margin-bottom: 30px; }
.field { text-align: left; margin: 0 auto 26px; max-width: 460px; }
.field label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.field input {
  width: 100%; padding: 14px 16px; font-size: 17px; color: var(--text);
  background: var(--space-panel); border: 1px solid var(--space-line); border-radius: var(--radius-s);
}
.field input:focus { border-color: var(--accent); outline: none; box-shadow: var(--glow); }
.class-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 28px; }
.class-card {
  text-align: left; padding: 18px; border-radius: var(--radius);
  background: var(--space-panel); border: 2px solid var(--space-line);
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease; position: relative;
}
.class-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
.class-card.selected { border-color: var(--accent); box-shadow: var(--glow); }
.class-card.selected::after { content:"✓"; position:absolute; top:12px; right:14px; color: var(--accent); font-weight:700; }
.class-card .cc-ico { font-size: 34px; }
.class-card .cc-name { font-family: var(--font-display); font-size: 18px; margin: 6px 0 2px; }
.class-card .cc-bonus { color: var(--star-gold); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.class-card .cc-blurb { color: var(--muted); font-size: 13px; }

/* ---------- 9. Звёздная карта миров ---------- */
.starmap { position: relative; padding: 6px 0 20px; }
.world-node {
  position: relative; display: flex; gap: 16px; align-items: stretch;
  padding: 4px 0 26px; padding-left: 64px;
}
/* линия-коннектор между мирами */
.world-node::before {
  content:""; position:absolute; left: 27px; top: 56px; bottom: -8px; width: 3px;
  background: linear-gradient(var(--accent), transparent);
  opacity: .5;
}
.world-node:last-child::before { display:none; }
.node-orb {
  position: absolute; left: 0; top: 6px;
  width: 56px; height: 56px; border-radius: 50%; display:grid; place-items:center; font-size: 26px;
  background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26);
  border: 2px solid var(--space-line); z-index: 2;
}
.world-node.open .node-orb { border-color: var(--w-accent, var(--accent)); box-shadow: 0 0 16px var(--w-accent, var(--accent)); }
.world-node.current .node-orb { animation: orbPulse 2.2s ease-in-out infinite; }
.world-node.locked .node-orb { filter: grayscale(.7) brightness(.7); }
@keyframes orbPulse {
  0%,100% { box-shadow: 0 0 12px var(--w-accent, var(--accent)); }
  50%     { box-shadow: 0 0 26px var(--w-accent, var(--accent)), 0 0 6px #fff; }
}
.world-card {
  flex: 1; padding: 16px 18px; border-radius: var(--radius);
  background: var(--space-panel); border: 1px solid var(--space-line);
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.world-node.open .world-card { cursor: pointer; }
.world-node.open .world-card:hover { transform: translateX(4px); border-color: var(--w-accent, var(--accent)); box-shadow: var(--shadow); }
.world-node.locked .world-card { opacity: .62; }
.world-card .wc-top { display:flex; align-items:center; justify-content: space-between; gap: 10px; }
.world-card .wc-name { font-family: var(--font-display); font-size: 18px; }
.world-card .wc-blurb { color: var(--muted); font-size: 13px; margin: 6px 0 10px; }
.badge {
  font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; white-space: nowrap;
  border: 1px solid var(--space-line); color: var(--muted);
}
.badge.open { color: var(--bio-green); border-color: rgba(74,222,128,.4); }
.badge.soon { color: var(--star-gold); border-color: rgba(255,209,102,.35); }
.badge.done { color: var(--plasma-cyan); border-color: rgba(56,225,255,.4); }
.wc-progress { font-size: 12px; color: var(--muted); }

/* ---------- 10. Список тем мира ---------- */
.topic-list { display: grid; gap: 12px; }
.topic-row {
  display:flex; align-items:center; gap: 14px; padding: 14px 16px;
  background: var(--space-panel); border: 1px solid var(--space-line); border-radius: var(--radius);
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.topic-row.unlocked { cursor: pointer; }
.topic-row.unlocked:hover { transform: translateX(4px); border-color: var(--accent); box-shadow: var(--shadow); }
.topic-row.locked { opacity: .55; }
.topic-ico {
  width: 46px; height: 46px; flex:0 0 46px; border-radius: 12px; display:grid; place-items:center; font-size: 23px;
  background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26); border: 1px solid var(--space-line);
}
.topic-row.done .topic-ico { border-color: var(--bio-green); box-shadow: 0 0 12px rgba(74,222,128,.4); }
.topic-meta { flex:1; min-width: 0; }
.topic-meta .tname { font-family: var(--font-display); font-size: 16px; }
.topic-meta .ttag { font-size: 13px; color: var(--muted); }
.topic-mini { display:flex; gap:5px; margin-top:7px; }
.pip { width: 22px; height: 5px; border-radius: 99px; background: #0e0f24; border: 1px solid var(--space-line); }
.pip.on { background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-color: transparent; }
.topic-right { text-align:right; }

/* ---------- 11. Консоль миссии (экран темы) ---------- */
.console-head {
  display:flex; gap: 14px; align-items: center; padding: 18px;
  border-radius: var(--radius); background: linear-gradient(135deg, rgba(56,225,255,.08), rgba(160,107,255,.08));
  border: 1px solid var(--space-line); margin-bottom: 18px;
}
.console-head .ch-ico { font-size: 40px; }
.console-head h2 { margin:0; font-size: clamp(20px,5vw,26px); }
.console-head .ch-tag { color: var(--muted); font-size: 14px; }

/* трекер этапов */
.stages { display:grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 22px; }
.stage-tab {
  position: relative; text-align:center; padding: 12px 6px; border-radius: var(--radius-s);
  background: var(--space-deep); border: 1px solid var(--space-line); color: var(--muted);
  transition: all .15s ease;
}
.stage-tab .st-step { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.stage-tab .st-ico { font-size: 22px; display:block; margin: 3px 0; }
.stage-tab .st-name { font-size: 12px; font-weight: 500; }
.stage-tab:hover { color: var(--text); border-color: var(--accent); }
.stage-tab.active { color:#0a0a1f; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
.stage-tab.done::after {
  content:"✓"; position:absolute; top:6px; right:8px; font-size: 12px; font-weight:700;
  color: var(--bio-green);
}
.stage-tab.active.done::after { color:#0a3; }

.panel {
  background: var(--space-panel); border: 1px solid var(--space-line);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
}
.panel h3 { font-size: 18px; }
.panel-intro { color: var(--muted); margin-bottom: 16px; }

/* ---------- 12. Карточки теории (с переворотом) ---------- */
.theory-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; }
.flip { perspective: 1000px; height: 210px; }
.flip-inner { position: relative; width:100%; height:100%; transition: transform .6s; transform-style: preserve-3d; cursor:pointer; }
.flip.flipped .flip-inner { transform: rotateY(180deg); }
.flip-face {
  position:absolute; inset:0; backface-visibility: hidden; border-radius: var(--radius);
  padding: 16px; display:flex; flex-direction:column; border: 1px solid var(--space-line);
}
.flip-front { background: linear-gradient(160deg, var(--space-panel), #15163a); align-items:center; justify-content:center; text-align:center; gap:8px; }
.flip-front .tf-emoji { font-size: 40px; }
.flip-front .tf-title { font-family: var(--font-display); font-size: 15px; }
.flip-front .tf-hint { font-size: 12px; color: var(--text-dim); margin-top: auto; }
.flip-back { background: linear-gradient(160deg, #15163a, var(--space-deep)); transform: rotateY(180deg); overflow:auto; }
.flip-back .tf-text { font-size: 13px; }
.flip-back .tf-formula {
  font-family: var(--font-display); color: var(--accent); background: #0e0f24;
  border:1px solid var(--space-line); border-radius: 8px; padding: 7px 10px; margin: 8px 0; text-align:center; font-size: 14px;
}
.flip-back .tf-example { font-size: 12px; color: var(--muted); }
.flip.read .flip-front { border-color: var(--bio-green); }
.flip.read .flip-front::after { content:"✓"; position:absolute; top:8px; right:10px; color: var(--bio-green); font-weight:700; }

/* ---------- 13. Эксперимент ---------- */
.exp-steps { counter-reset: step; list-style:none; padding:0; margin: 0 0 16px; display:grid; gap:10px; }
.exp-steps li { position: relative; padding: 12px 14px 12px 46px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); font-size: 14px; }
.exp-steps li::before {
  counter-increment: step; content: counter(step);
  position:absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; border-radius: 50%; display:grid; place-items:center; font-size: 13px; font-weight:700;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a1f;
}
.exp-insight { background: rgba(56,225,255,.08); border-left: 3px solid var(--accent); padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }

/* ---------- 14. Вопросы / квиз ---------- */
.q-text { font-size: 16px; margin-bottom: 14px; }
.options { display:grid; gap: 10px; }
.option {
  text-align:left; padding: 13px 16px; border-radius: var(--radius-s);
  background: var(--space-deep); border: 1px solid var(--space-line); color: var(--text); font-size: 15px;
  transition: all .12s ease;
}
.option:hover:not(:disabled) { border-color: var(--accent); transform: translateX(3px); }
.option.correct { border-color: var(--bio-green); background: rgba(74,222,128,.14); color: var(--bio-green); }
.option.wrong { border-color: var(--reaction-pink); background: rgba(255,93,143,.12); color: var(--reaction-pink); }
.option:disabled { cursor: default; }
.q-progress { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

/* объяснение/фидбек */
.feedback { margin-top: 14px; padding: 13px 15px; border-radius: var(--radius-s); font-size: 14px; display:flex; gap: 10px; align-items: flex-start; }
.feedback.ok { background: rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); }
.feedback.no { background: rgba(255,93,143,.08); border:1px solid rgba(255,93,143,.3); }
.feedback .fb-ico { font-size: 18px; }

/* ---------- 15. Задачи (числовой ввод) ---------- */
.problem .q-text { margin-bottom: 16px; }
.answer-row { display:flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.answer-row input {
  flex: 1; min-width: 140px; padding: 13px 15px; font-size: 16px; color: var(--text);
  background: var(--space-deep); border: 1px solid var(--space-line); border-radius: var(--radius-s);
}
.answer-row input:focus { border-color: var(--accent); outline:none; box-shadow: var(--glow); }
.answer-row .unit { color: var(--muted); font-size: 15px; font-weight:600; }
.solution { margin-top: 14px; padding: 13px 15px; background: rgba(160,107,255,.08); border-left: 3px solid var(--quantum-violet); border-radius: 8px; font-size: 14px; }

/* ---------- 16. Босс ---------- */
.boss-panel {
  background: radial-gradient(circle at 50% 0%, rgba(255,93,143,.16), var(--space-panel) 60%);
  border: 1px solid rgba(255,93,143,.4); position: relative; overflow: hidden;
}
.boss-panel::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(400px 200px at 50% -30%, rgba(255,93,143,.25), transparent 70%);
}
.boss-head { display:flex; gap: 14px; align-items:center; margin-bottom: 14px; }
.boss-head .b-ico { font-size: 44px; filter: drop-shadow(0 0 10px var(--reaction-pink)); }
.boss-head h3 { color: var(--reaction-pink); margin:0; font-size: 22px; }
.boss-story { font-size: 15px; margin-bottom: 18px; }
.boss-defeated { text-align:center; padding: 10px; }
.boss-defeated .bd-emoji { font-size: 52px; }

/* ---------- 17. Кабинет ученика ---------- */
.subtabs { display:flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.subtab {
  padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
  background: var(--space-deep); border:1px solid var(--space-line); color: var(--muted);
}
.subtab.active { color: var(--text); border-color: var(--accent); background: rgba(56,225,255,.08); }
.subtab:hover { color: var(--text); }

.hero-sheet { display:grid; grid-template-columns: auto 1fr; gap: 20px; align-items:center; }
.hero-sheet .hs-avatar {
  width: 96px; height:96px; border-radius: 50%; display:grid; place-items:center; font-size: 48px;
  background: radial-gradient(circle at 30% 25%, #20214a, #0e0f26); border: 3px solid var(--accent); box-shadow: 0 0 22px var(--accent);
}
.hs-info .hs-name { font-family: var(--font-display); font-size: 24px; }
.hs-info .hs-class { color: var(--muted); margin-bottom: 4px; }
.hs-info .hs-bonus { color: var(--star-gold); font-size: 13px; font-weight: 600; }
.stat-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 12px; margin-top: 18px; }
.stat-box { text-align:center; padding: 14px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); }
.stat-box .sb-num { font-family: var(--font-display); font-size: 24px; color: var(--accent); }
.stat-box .sb-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* знания */
.know-row { display:flex; align-items:center; gap: 12px; padding: 11px 14px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); margin-bottom: 8px; }
.know-row .kr-ico { font-size: 20px; }
.know-row .kr-name { flex:1; font-size: 14px; }
.know-row .kr-state { font-size: 12px; }
.weak { color: var(--reaction-pink); }
.empty-hint { text-align:center; color: var(--muted); padding: 24px; font-size: 14px; }

/* достижения / коллекция */
.ach-grid, .item-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
.ach, .col-item {
  text-align:center; padding: 16px 12px; border-radius: var(--radius);
  background: var(--space-deep); border:1px solid var(--space-line); transition: transform .15s ease;
}
.ach.got, .col-item.got { border-color: var(--star-gold); box-shadow: 0 0 14px rgba(255,209,102,.25); }
.ach .a-ico, .col-item .ci-ico { font-size: 34px; filter: grayscale(1) opacity(.4); }
.ach.got .a-ico, .col-item.got .ci-ico { filter: none; }
.ach .a-name, .col-item .ci-name { font-family: var(--font-display); font-size: 13px; margin: 8px 0 4px; }
.ach .a-desc, .col-item .ci-desc { font-size: 12px; color: var(--muted); }
.locked-tag { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

/* миссии */
.mission { display:flex; align-items:center; gap: 14px; padding: 14px 16px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius); margin-bottom: 10px; }
.mission .m-ico { font-size: 26px; }
.mission .m-body { flex:1; }
.mission .m-title { font-size: 15px; font-weight: 600; }
.mission .m-sub { font-size: 13px; color: var(--muted); }
.mission.done { opacity:.6; }
.mission.done .m-title { text-decoration: line-through; }

/* ---------- 18. Лавка ---------- */
.shop-section { margin-bottom: 26px; }
.shop-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 12px; }
.shop-item { text-align:center; padding: 16px 12px; border-radius: var(--radius); background: var(--space-deep); border:1px solid var(--space-line); transition: transform .15s ease, border-color .15s; }
.shop-item:hover { transform: translateY(-2px); }
.shop-item .si-ico { font-size: 40px; }
.swatch { width: 46px; height: 46px; border-radius: 50%; margin: 0 auto; border: 2px solid #fff2; }
.shop-item .si-name { font-size: 13px; margin: 8px 0 6px; }
.price { color: var(--star-gold); font-weight: 600; font-size: 13px; }
.shop-item.owned { border-color: var(--bio-green); }
.shop-item.equipped { border-color: var(--accent); box-shadow: var(--glow); }
.tag-own { font-size: 11px; color: var(--bio-green); }
.tag-eq { font-size: 11px; color: var(--accent); }

/* ---------- 19. Кабинет учителя ---------- */
.demo-banner {
  background: rgba(255,209,102,.1); border:1px solid rgba(255,209,102,.4); color: var(--star-gold);
  padding: 12px 16px; border-radius: var(--radius-s); font-size: 13px; margin-bottom: 18px;
}
.table-card { background: var(--space-panel); border:1px solid var(--space-line); border-radius: var(--radius); overflow:hidden; }
.t-row { display:grid; grid-template-columns: 1fr auto auto; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--space-line); align-items:center; }
.t-row:last-child { border-bottom:none; }
.t-row.head { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing:1px; }
.t-name { font-weight: 500; }
.future-list { display:grid; gap:10px; margin-top: 16px; }
.future-list .fl { display:flex; gap:10px; align-items:center; padding: 12px 14px; background: var(--space-deep); border:1px solid var(--space-line); border-radius: var(--radius-s); font-size: 14px; color: var(--muted); }

/* ---------- 20. Тосты, наставник, празднование ---------- */
#toasts { position: fixed; top: 14px; right: 14px; z-index: 80; display:flex; flex-direction:column; gap: 10px; pointer-events:none; }
.toast {
  pointer-events:auto; min-width: 220px; max-width: 320px; padding: 12px 16px; border-radius: var(--radius-s);
  background: rgba(18,18,46,.96); border: 1px solid var(--accent); box-shadow: var(--shadow);
  display:flex; gap: 10px; align-items:center; font-size: 14px;
  animation: toastIn .35s cubic-bezier(.2,.8,.2,1);
}
.toast .t-ico { font-size: 22px; }
.toast.gold { border-color: var(--star-gold); }
.toast.green { border-color: var(--bio-green); }
.toast.pink { border-color: var(--reaction-pink); }
.toast .t-strong { font-weight: 600; }
.toast .t-sub { font-size: 12px; color: var(--muted); }
@keyframes toastIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform:none; } }
.toast.out { animation: toastOut .35s ease forwards; }
@keyframes toastOut { to { opacity:0; transform: translateX(40px); } }

/* наставник */
.mentor-pop {
  position: fixed; left: 14px; bottom: 14px; z-index: 70; max-width: 360px;
  display:flex; gap: 12px; align-items: flex-start; padding: 14px 16px;
  background: rgba(18,18,46,.97); border: 1px solid var(--quantum-violet); border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(0,0,0,.5); animation: mentorIn .4s cubic-bezier(.2,.8,.2,1);
}
.mentor-pop .mp-avatar {
  width: 44px; height:44px; flex:0 0 44px; border-radius: 50%; display:grid; place-items:center; font-size: 24px;
  background: radial-gradient(circle at 30% 25%, #2a2350, #14112e); border: 2px solid var(--quantum-violet);
}
.mentor-pop .mp-name { font-family: var(--font-display); font-size: 13px; color: var(--quantum-violet); }
.mentor-pop .mp-text { font-size: 13.5px; margin-top: 2px; }
.mentor-pop .mp-close { position:absolute; top: 6px; right: 10px; background:none; border:none; color: var(--muted); font-size: 16px; }
@keyframes mentorIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }
.mentor-pop.out { animation: mentorOut .35s ease forwards; }
@keyframes mentorOut { to { opacity:0; transform: translateY(20px); } }

/* празднование уровня/босса */
.overlay {
  position: fixed; inset:0; z-index: 90; display:grid; place-items:center;
  background: rgba(6,6,20,.78); backdrop-filter: blur(4px); animation: fadeIn .25s ease;
}
.celebrate {
  text-align:center; padding: 38px 34px; border-radius: 22px; max-width: 380px; position: relative;
  background: radial-gradient(circle at 50% 0%, rgba(160,107,255,.25), var(--space-panel) 65%);
  border: 1px solid var(--accent); box-shadow: 0 0 50px rgba(56,225,255,.4);
  animation: popIn .45s cubic-bezier(.2,.9,.3,1.2);
}
.celebrate .cel-emoji { font-size: 64px; animation: floaty 2.4s ease-in-out infinite; }
.celebrate h2 { font-size: 26px; margin: 8px 0 4px;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
  -webkit-background-clip:text; background-clip:text; color: transparent; }
.celebrate .cel-sub { color: var(--text); font-size: 15px; margin-bottom: 8px; }
.celebrate .cel-mentor { color: var(--muted); font-size: 13px; font-style: italic; margin-bottom: 20px; }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes popIn { from { opacity:0; transform: scale(.8) translateY(20px); } to { opacity:1; transform:none; } }
@keyframes floaty { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

/* конфетти-искры */
.spark { position: fixed; width: 9px; height: 9px; z-index: 95; pointer-events:none; border-radius: 2px; }

/* ---------- 21. Адаптив ---------- */
@media (max-width: 620px) {
  .app-wrap { padding: 0 12px 96px; }
  .class-grid { grid-template-columns: 1fr; }
  .hero-sheet { grid-template-columns: 1fr; text-align:center; justify-items:center; }
  .stages { grid-template-columns: repeat(2, 1fr); }
  .hud-stats .studied { display:none; }       /* экономим место в HUD на телефоне */
  .hud { gap: 10px; }
  .hud-avatar { width:44px; height:44px; flex-basis:44px; font-size:22px; }

  /* нижняя плавающая навигация */
  .tabs {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; margin: 0; gap: 0;
    background: rgba(12,12,30,.96); backdrop-filter: blur(12px);
    border-top: 1px solid var(--space-line); padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
    border-radius: 0;
  }
  .tab { background: transparent; border: none; min-width: 0; border-radius: 10px; padding: 6px 4px; }
  .tab.active { background: transparent; color: var(--accent); }
  .tab.active .ico { transform: translateY(-1px); }
}

@media (max-width: 380px) {
  .theory-grid { grid-template-columns: 1fr; }
}

/* уважение к настройке «меньше движения» */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  .stars { animation: none; }
}

/* ============================================================
   СЮЖЕТ — «Источник Знаний»
   Блок лора на экране создания героя и индикатор частей Источника на карте.
   ============================================================ */
.lore{
  max-width: 560px;
  margin: 2px auto 20px;
  padding: 15px 18px;
  text-align: left;
  border: 1px solid rgba(56, 225, 255, .35);
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(56, 225, 255, .08), rgba(160, 107, 255, .06));
  box-shadow: 0 0 26px rgba(56, 225, 255, .10);
}
.lore-title{
  font-family: "Russo One", system-ui, sans-serif;
  color: var(--plasma-cyan, #38e1ff);
  margin: 0 0 8px;
  font-size: 15px;
  letter-spacing: .3px;
}
.lore p{
  margin: 6px 0;
  color: var(--text, #eef1ff);
  font-size: 14px;
  line-height: 1.5;
}
.lore .lore-motto{
  margin-top: 10px;
  color: var(--star-gold, #ffd166);
  font-weight: 600;
}
.shard-bar{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid rgba(255, 209, 102, .40);
  background: rgba(255, 209, 102, .08);
  color: var(--star-gold, #ffd166);
  font-weight: 600;
  font-size: 13px;
}

/* ============================================================
   ВИЗУАЛЬНАЯ НОВЕЛЛА — список глав и проигрыватель сцен
   ============================================================ */

/* — Список глав — */
.ch-list { display: flex; flex-direction: column; gap: 14px; margin-top: 6px; }
.ch-card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,.10);
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  position: relative; overflow: hidden;
}
.ch-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--w-accent, #38e1ff);
}
.ch-card.open { border-color: color-mix(in srgb, var(--w-accent, #38e1ff) 45%, transparent); }
.ch-card.done { border-color: rgba(74,222,128,.45); }
.ch-card.locked { opacity: .6; }
.ch-ico {
  font-size: 30px; width: 56px; height: 56px; flex: none;
  display: grid; place-items: center; border-radius: 14px;
  background: radial-gradient(circle at 50% 40%, color-mix(in srgb, var(--w-accent,#38e1ff) 35%, transparent), transparent 70%);
}
.ch-body { flex: 1; min-width: 0; }
.ch-sub { font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted, #9aa0c7); }
.ch-title { font-family: "Russo One", system-ui, sans-serif; font-size: 17px; color: var(--text, #eef1ff); margin: 2px 0 4px; }
.ch-done { color: #4ade80; }
.ch-blurb { font-size: 13px; color: var(--muted, #9aa0c7); line-height: 1.4; }
.ch-act { flex: none; }
.ch-soon { font-size: 12px; color: var(--muted, #9aa0c7); white-space: nowrap; }

/* — Сцена (новелла) — */
.scene { display: flex; flex-direction: column; gap: 14px; }
.vn-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.vn-back { color: var(--accent, #38e1ff); font-size: 13px; cursor: pointer; text-decoration: none; }
.vn-back:hover { text-decoration: underline; }
.vn-progress { font-size: 12px; color: var(--muted, #9aa0c7); text-align: right; }

.vn-stage {
  display: flex; flex-direction: column; align-items: center;
  position: relative; padding-top: 44px; margin-top: 8px;
}
.vn-portrait {
  position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
  width: 84px; height: 84px; font-size: 44px;
  display: grid; place-items: center; border-radius: 50%; z-index: 2;
  background: radial-gradient(circle at 50% 40%, color-mix(in srgb, var(--w-accent,#38e1ff) 55%, #12122e), #0a0a1f 75%);
  border: 2px solid color-mix(in srgb, var(--w-accent,#38e1ff) 60%, transparent);
  box-shadow: 0 0 30px color-mix(in srgb, var(--w-accent,#38e1ff) 40%, transparent);
}
.vn-box {
  width: 100%; padding: 50px 20px 20px; border-radius: 20px;
  border: 1px solid color-mix(in srgb, var(--w-accent,#38e1ff) 30%, transparent);
  background: linear-gradient(180deg, rgba(18,18,46,.92), rgba(10,10,31,.92));
  box-shadow: 0 14px 40px rgba(0,0,0,.4);
}
.vn-name {
  text-align: center; font-family: "Russo One", system-ui, sans-serif;
  color: var(--w-accent, #38e1ff); font-size: 15px; letter-spacing: .4px; margin-bottom: 10px;
}
.vn-text { font-size: 16px; line-height: 1.6; color: var(--text, #eef1ff); text-align: center; }
.vn-q { font-weight: 600; font-size: 15px; color: var(--text, #eef1ff); margin: 16px 0 10px; }

/* — Выборы в диалоге — */
.vn-choices { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.vn-choice {
  padding: 12px 16px; border-radius: 12px; cursor: pointer; text-align: left;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.04); color: var(--text, #eef1ff);
  font-size: 15px; font-family: var(--font-body, inherit); transition: .15s;
}
.vn-choice:hover { border-color: var(--w-accent, #38e1ff); background: color-mix(in srgb, var(--w-accent,#38e1ff) 12%, transparent); transform: translateY(-1px); }

/* — Кнопки/действия сцены — */
.vn-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 18px; justify-content: center; }
.vn-done { color: #4ade80; font-weight: 600; font-size: 14px; }

/* — Фидбек (объяснение / разбор ошибки) — */
.vn-feedback { margin-top: 14px; padding: 12px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.vn-feedback.ok { background: rgba(74,222,128,.10); border: 1px solid rgba(74,222,128,.4); color: #d6ffe4; }
.vn-feedback.bad { background: rgba(255,93,143,.10); border: 1px solid rgba(255,93,143,.4); color: #ffd9e5; }
.vn-mini-name { font-weight: 700; color: var(--star-gold, #ffd166); }

/* — Практика внутри сцены — */
.vn-practice { margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
.vn-ptitle { font-family: "Russo One", system-ui, sans-serif; font-size: 14px; color: var(--star-gold, #ffd166); }
.task-card {
  padding: 14px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03);
}
.task-card.solved { border-color: rgba(74,222,128,.4); background: rgba(74,222,128,.05); }
.task-q { font-size: 15px; color: var(--text, #eef1ff); margin-bottom: 10px; line-height: 1.5; }
.task-svg { margin: 4px 0 12px; display: flex; justify-content: center; }
.task-svg svg { background: rgba(10,10,31,.5); border-radius: 10px; padding: 6px; }
.ok-badge { color: #4ade80; font-weight: 700; font-size: 18px; }

/* — Финал главы — */
.vn-outro { margin-top: 16px; text-align: center; }
.vn-outro-title { font-family: "Russo One", system-ui, sans-serif; font-size: 18px; color: var(--star-gold, #ffd166); }
.vn-outro-sub { font-size: 14px; color: var(--muted, #9aa0c7); margin-top: 6px; line-height: 1.5; }
.vn-empty { padding: 24px; text-align: center; color: var(--muted, #9aa0c7); }
.vn-empty a { color: var(--accent, #38e1ff); cursor: pointer; }

@media (max-width: 480px) {
  .vn-text { font-size: 15px; }
  .ch-ico { font-size: 26px; width: 48px; height: 48px; }
  .ch-title { font-size: 15px; }
}

/* ============================================================
   Ньютончик (рисованный SVG) в портрете сцены
   ============================================================ */
.vn-portrait.has-char { padding: 0; }
.vn-portrait .newton-svg { width: 84px; height: 84px; display: block; }

/* ============================================================
   Пролог (холодный старт)
   ============================================================ */
.prologue-title {
  text-align: center; font-family: "Russo One", system-ui, sans-serif;
  font-size: 30px; letter-spacing: 1px; margin-top: 6px;
  background: linear-gradient(90deg, var(--plasma-cyan, #38e1ff), var(--quantum-violet, #a06bff));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: var(--plasma-cyan, #38e1ff);
}
.prologue-sub { text-align: center; color: var(--muted, #9aa0c7); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }

/* ============================================================
   Лаборатория открытий (собранные законы)
   ============================================================ */
.disc-count { font-size: 14px; color: var(--muted, #9aa0c7); margin: 4px 0 12px; }
.disc-count b { color: var(--star-gold, #ffd166); font-size: 18px; font-family: "Russo One", system-ui, sans-serif; }
.disc-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 560px) { .disc-grid { grid-template-columns: 1fr 1fr; } }
.disc-card {
  display: flex; align-items: center; gap: 14px; padding: 14px;
  border-radius: 16px; border: 1px solid rgba(255,255,255,.10);
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
}
.disc-card.open { border-color: rgba(56,225,255,.4); box-shadow: 0 0 22px rgba(56,225,255,.12); }
.disc-card.locked { opacity: .55; }
.disc-ico {
  font-size: 26px; width: 52px; height: 52px; flex: none; display: grid; place-items: center;
  border-radius: 14px; background: radial-gradient(circle at 50% 40%, rgba(56,225,255,.28), transparent 70%);
}
.disc-card.locked .disc-ico { background: rgba(255,255,255,.05); }
.disc-body { min-width: 0; }
.disc-name { font-size: 12px; letter-spacing: .4px; text-transform: uppercase; color: var(--muted, #9aa0c7); }
.disc-formula {
  font-family: "Russo One", system-ui, sans-serif; font-size: 22px; color: var(--plasma-cyan, #38e1ff);
  margin: 3px 0; letter-spacing: .5px;
}
.disc-card.locked .disc-formula { color: var(--muted, #9aa0c7); letter-spacing: 4px; }
.disc-tag { font-size: 13px; color: var(--text, #eef1ff); opacity: .85; }
.disc-hint { font-size: 12px; color: var(--muted, #9aa0c7); }

/* Момент получения закона в финале главы */
.vn-lawget {
  margin-top: 12px; padding: 10px 14px; border-radius: 12px; text-align: center;
  background: rgba(255,209,102,.10); border: 1px solid rgba(255,209,102,.4); color: #ffe9b8; font-size: 14px;
  animation: artifactIn .85s cubic-bezier(.2,.8,.2,1) both;
}
.vn-lawget b { font-family: "Russo One", system-ui, sans-serif; color: var(--star-gold, #ffd166); }

/* ============================================================
   Приветствие Ньютончика на входе («История»)
   ============================================================ */
.hub-greet {
  display: flex; align-items: center; gap: 14px; margin: 4px 0 18px;
  padding: 12px 14px; border-radius: 18px;
  border: 1px solid rgba(56,225,255,.3);
  background: linear-gradient(180deg, rgba(56,225,255,.10), rgba(160,107,255,.06));
}
.hub-portrait {
  width: 64px; height: 64px; flex: none; border-radius: 50%;
  display: grid; place-items: center;
  background: radial-gradient(circle at 50% 40%, rgba(56,225,255,.35), #0a0a1f 75%);
  border: 2px solid rgba(56,225,255,.5);
}
.hub-portrait .newton-svg { width: 60px; height: 60px; display: block; }
.hub-bubble { min-width: 0; }
.hub-name { font-family: "Russo One", system-ui, sans-serif; color: var(--plasma-cyan, #38e1ff); font-size: 13px; margin-bottom: 3px; }
.hub-text { font-size: 14px; line-height: 1.45; color: var(--text, #eef1ff); }

/* Стиль исследователя в профиле */
.hs-style { font-size: 13px; color: var(--muted, #9aa0c7); margin-top: 6px; }
.hs-style b { color: var(--star-gold, #ffd166); }

/* ============================================================
   Программа по классам (учебная карта)
   ============================================================ */
.prog-intro {
  font-size: 13px; line-height: 1.5; color: var(--text, #eef1ff);
  background: rgba(56,225,255,.08); border: 1px solid rgba(56,225,255,.25);
  border-radius: 12px; padding: 10px 12px; margin-bottom: 14px;
}
.prog-grade {
  border: 1px solid rgba(255,255,255,.10); border-radius: 16px;
  padding: 12px 14px; margin-bottom: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
}
.prog-head { font-family: "Russo One", system-ui, sans-serif; font-size: 15px; color: var(--star-gold, #ffd166); margin-bottom: 8px; }
.prog-head b { color: var(--text, #eef1ff); }
.prog-sub { font-size: 11px; letter-spacing: .4px; text-transform: uppercase; color: var(--muted, #9aa0c7); margin: 8px 0 6px; }
.prog-item {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;
  text-align: left; padding: 9px 12px; margin-bottom: 6px; border-radius: 10px; cursor: pointer;
  border: 1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03);
  color: var(--text, #eef1ff); font-size: 14px; font-family: var(--font-body, inherit); transition: .15s;
}
.prog-item:hover { border-color: var(--plasma-cyan, #38e1ff); transform: translateX(2px); }
.prog-item.ch { border-color: rgba(160,107,255,.3); }
.prog-tag { flex: none; font-size: 11px; color: var(--muted, #9aa0c7); }
.prog-note { font-size: 13px; color: var(--muted, #9aa0c7); font-style: italic; padding: 4px 2px; }

/* подтабы Лаборатории прокручиваются по горизонтали, если их много */
.subtabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
.subtabs .subtab { white-space: nowrap; flex: none; }

/* ============================================================
   Курс-кампания (теория-RPG): карта миссий + экран миссии
   ============================================================ */
.mq-top { margin-bottom: 10px; }
.mq-hero { display: flex; gap: 12px; align-items: center; padding: 14px;
  border: 1px solid rgba(126,231,135,.28); border-radius: 16px; margin-bottom: 14px;
  background: linear-gradient(180deg, rgba(126,231,135,.10), rgba(255,255,255,.02)); }
.mq-hero-newton { flex: none; width: 76px; }
.mq-hero-newton svg { width: 76px; height: 76px; }
.mq-hero-title { font-family: "Russo One", system-ui, sans-serif; font-size: 19px; color: var(--text, #eef1ff); }
.mq-hero-sub { font-size: 13px; line-height: 1.5; color: var(--muted, #9aa0c7); margin-top: 4px; }

.mq-progress-wrap { margin-bottom: 16px; }
.mq-progress { height: 12px; border-radius: 8px; background: rgba(255,255,255,.08); overflow: hidden; border: 1px solid rgba(255,255,255,.10); }
.mq-progress-fill { height: 100%; background: linear-gradient(90deg, #7ee787, #38e1ff); transition: width .4s ease; }
.mq-progress-txt { font-size: 12px; color: var(--muted, #9aa0c7); margin-top: 6px; }

.mq-act { border: 1px solid rgba(255,255,255,.10); border-radius: 16px; padding: 12px 14px; margin-bottom: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)); }
.mq-act-head { display: flex; align-items: center; gap: 8px; font-family: "Russo One", system-ui, sans-serif; font-size: 15px; color: var(--text, #eef1ff); }
.mq-act-ico { font-size: 18px; }
.mq-act-sum { font-size: 12px; color: var(--muted, #9aa0c7); margin: 4px 0 10px; }
.mq-row { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; cursor: pointer;
  padding: 10px 12px; margin-bottom: 7px; border-radius: 11px; transition: .15s;
  border: 1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03); color: var(--text, #eef1ff); font-size: 14px; font-family: var(--font-body, inherit); }
.mq-row:hover { border-color: var(--plasma-cyan, #38e1ff); transform: translateX(2px); }
.mq-row.done { border-color: rgba(126,231,135,.4); background: rgba(126,231,135,.07); }
.mq-row.locked { opacity: .55; cursor: not-allowed; }
.mq-row.locked:hover { transform: none; border-color: rgba(255,255,255,.10); }
.mq-st { flex: none; width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; }
.mq-st.done { background: #7ee787; color: #06210b; }
.mq-st.go { background: var(--plasma-cyan, #38e1ff); color: #042430; }
.mq-st.lock { background: rgba(255,255,255,.10); }
.mq-title { flex: 1; }
.mq-formula { flex: none; font-size: 12px; color: var(--star-gold, #ffd166); font-family: "Russo One", monospace; }

.mq-mission-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mq-badge { font-size: 12px; color: var(--muted, #9aa0c7); }
.mq-newton { display: flex; gap: 10px; align-items: center; padding: 10px 12px; margin-bottom: 14px;
  border: 1px solid rgba(56,225,255,.22); border-radius: 14px; background: rgba(56,225,255,.06); }
.mq-newton-ava { flex: none; width: 54px; }
.mq-newton-ava svg { width: 54px; height: 54px; }
.mq-newton-bubble { font-size: 13px; line-height: 1.5; color: var(--text, #eef1ff); }
.mq-h { font-family: "Russo One", system-ui, sans-serif; font-size: 22px; color: var(--text, #eef1ff); margin: 4px 0 12px; }

/* теория внутри миссии */
.th-body { margin-bottom: 6px; }
.th-p { font-size: 15px; line-height: 1.65; color: var(--text, #eef1ff); margin: 0 0 11px; }
.th-def { font-size: 14.5px; line-height: 1.6; color: var(--text, #eef1ff); padding: 11px 13px; margin: 0 0 12px;
  border-left: 3px solid var(--plasma-cyan, #38e1ff); border-radius: 8px; background: rgba(56,225,255,.07); }
.th-formula { position: relative; padding: 14px 14px 12px; margin: 0 0 12px; border-radius: 12px; text-align: center;
  border: 1px solid rgba(255,209,102,.35); background: linear-gradient(180deg, rgba(255,209,102,.12), rgba(255,255,255,.02)); }
.th-f-tag { display: inline-block; font-size: 10px; letter-spacing: .6px; text-transform: uppercase; color: #06210b;
  background: var(--star-gold, #ffd166); padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; }
.th-f { display: block; font-family: "Russo One", monospace; font-size: 22px; color: var(--star-gold, #ffd166); }
.th-fd { display: block; font-size: 12.5px; color: var(--muted, #9aa0c7); margin-top: 5px; }
.th-note { font-size: 14px; line-height: 1.55; color: var(--text, #eef1ff); padding: 10px 12px; margin: 0 0 12px;
  border-radius: 10px; background: rgba(255,255,255,.05); border: 1px dashed rgba(255,255,255,.18); }
.th-ex { font-size: 14px; line-height: 1.55; color: var(--text, #eef1ff); padding: 10px 12px; margin: 0 0 12px;
  border-radius: 10px; background: rgba(160,107,255,.08); border: 1px solid rgba(160,107,255,.22); }
.th-list { margin: 0 0 12px; padding-left: 20px; }
.th-list li { font-size: 14.5px; line-height: 1.55; color: var(--text, #eef1ff); margin-bottom: 5px; }
.th-remember { padding: 11px 13px; margin: 4px 0 14px; border-radius: 12px;
  background: rgba(126,231,135,.08); border: 1px solid rgba(126,231,135,.28); }
.th-rem-h { font-family: "Russo One", system-ui, sans-serif; font-size: 13px; color: #7ee787; margin-bottom: 6px; }
.th-remember ul { margin: 0; padding-left: 20px; }
.th-remember li { font-size: 13.5px; line-height: 1.5; color: var(--text, #eef1ff); margin-bottom: 4px; }

/* испытания */
.mq-trials { margin-top: 6px; }
.mq-trials-h { font-family: "Russo One", system-ui, sans-serif; font-size: 16px; color: var(--reaction-pink, #ff5da2); margin-bottom: 10px; }
.th-task { padding: 11px 13px; margin-bottom: 10px; border-radius: 12px;
  border: 1px solid rgba(255,93,162,.22); background: rgba(255,93,162,.06); }
.th-task-q { font-size: 14.5px; line-height: 1.55; color: var(--text, #eef1ff); }
.th-task-n { display: inline-block; font-size: 11px; font-weight: 700; color: var(--reaction-pink, #ff5da2); margin-right: 6px; }
.th-sol { margin-top: 8px; }
.th-sol summary { cursor: pointer; font-size: 13px; color: var(--plasma-cyan, #38e1ff); user-select: none; }
.th-sol summary:hover { text-decoration: underline; }
.th-sol-body { font-size: 14px; line-height: 1.55; color: var(--text, #eef1ff); margin-top: 8px; padding: 9px 11px; border-radius: 8px; background: rgba(255,255,255,.04); }

.mq-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
.mq-done-banner { width: 100%; text-align: center; font-family: "Russo One", system-ui, sans-serif; font-size: 15px; color: #7ee787;
  padding: 12px; border-radius: 12px; background: rgba(126,231,135,.10); border: 1px solid rgba(126,231,135,.3); }

/* кнопка входа в кампанию из «Программы» */
.prog-campaign { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer;
  padding: 12px 14px; margin-bottom: 10px; border-radius: 14px; transition: .15s;
  border: 1px solid rgba(126,231,135,.35); background: linear-gradient(180deg, rgba(126,231,135,.14), rgba(56,225,255,.06)); color: var(--text, #eef1ff); }
.prog-campaign:hover { transform: translateY(-1px); border-color: var(--plasma-cyan, #38e1ff); }
.pc-ico { font-size: 26px; flex: none; }
.pc-main { flex: 1; display: flex; flex-direction: column; }
.pc-main b { font-size: 14.5px; }
.pc-sub { font-size: 12px; color: var(--muted, #9aa0c7); margin-top: 2px; }
.pc-go { flex: none; color: var(--plasma-cyan, #38e1ff); font-size: 18px; }

/* ============================================================
   Навигация по классам: карточки классов + раздел класса
   ============================================================ */
.grade-cards { display: flex; flex-direction: column; gap: 10px; }
.grade-card { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
  padding: 14px; border-radius: 16px; transition: .15s; color: var(--text, #eef1ff);
  border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)); }
.grade-card:hover { transform: translateY(-1px); border-color: var(--plasma-cyan, #38e1ff); }
.gc-badge { flex: none; width: 48px; height: 48px; border-radius: 14px; display: grid; place-items: center;
  font-family: "Russo One", system-ui, sans-serif; font-size: 22px; color: #042430;
  background: linear-gradient(135deg, #38e1ff, #7ee787); }
.gc-main { flex: 1; }
.gc-title { font-family: "Russo One", system-ui, sans-serif; font-size: 17px; }
.gc-note { font-size: 12.5px; color: var(--muted, #9aa0c7); margin-top: 1px; }
.gc-bits { font-size: 12px; color: var(--text, #eef1ff); opacity: .8; margin-top: 6px; }
.gc-go { flex: none; color: var(--plasma-cyan, #38e1ff); font-size: 20px; }

.gh-hero { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 14px; border-radius: 16px;
  border: 1px solid rgba(56,225,255,.25); background: linear-gradient(180deg, rgba(56,225,255,.10), rgba(255,255,255,.02)); }
.gh-hero-ico { font-size: 30px; }
.gh-hero-title { font-family: "Russo One", system-ui, sans-serif; font-size: 20px; color: var(--text, #eef1ff); }
.gh-hero-sub { font-size: 12.5px; color: var(--muted, #9aa0c7); }
.gh-sec { margin-bottom: 16px; }
.gh-sec-h { font-family: "Russo One", system-ui, sans-serif; font-size: 14px; color: var(--star-gold, #ffd166); margin-bottom: 8px; }

/* график движения внутри теории */
.th-graph { margin: 0 0 12px; padding: 8px; border-radius: 12px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.10); }
.th-graph svg { width: 100%; height: auto; display: block; }

/* иллюстрация миссии (инлайн-SVG) */
.mq-illus { margin: 0 0 14px; padding: 10px; border-radius: 14px;
  background: radial-gradient(120% 120% at 50% 0%, rgba(56,225,255,.10), rgba(255,255,255,.02));
  border: 1px solid rgba(255,255,255,.10); }
.mq-illus svg { width: 100%; height: auto; max-height: 150px; display: block; }

/* ============================================================
   Тренажёр темы
   ============================================================ */
.tr-levels { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.tr-pill { flex: 1; min-width: 90px; cursor: pointer; padding: 8px 6px; border-radius: 10px; font-size: 12.5px;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); color: var(--text, #eef1ff); transition: .15s; }
.tr-pill.on { border-color: var(--star-gold, #ffd166); background: rgba(255,209,102,.14); color: var(--star-gold, #ffd166); font-weight: 700; }
.tr-pill.lock { opacity: .5; cursor: not-allowed; }
.tr-streak { font-size: 12.5px; color: var(--muted, #9aa0c7); margin-bottom: 12px; }
.tr-card { border: 1px solid rgba(56,225,255,.22); border-radius: 16px; padding: 16px;
  background: linear-gradient(180deg, rgba(56,225,255,.07), rgba(255,255,255,.02)); }
.tr-q { font-size: 16px; line-height: 1.55; color: var(--text, #eef1ff); margin-bottom: 14px; }
.tr-fb { font-size: 14.5px; padding: 10px 12px; border-radius: 10px; margin-bottom: 10px; }
.tr-fb.ok { background: rgba(126,231,135,.12); border: 1px solid rgba(126,231,135,.32); color: #bff5c5; }
.tr-fb.bad { background: rgba(255,93,93,.10); border: 1px solid rgba(255,93,93,.30); color: #ffc9c9; }
.tr-sol { font-size: 14px; line-height: 1.55; color: var(--text, #eef1ff); padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,.04); margin-bottom: 12px; }
.tr-actions { display: flex; flex-wrap: wrap; gap: 10px; }

/* ============================================================
   Миры (атлас): карточки + страница мира
   ============================================================ */
.realm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.realm-card { display: flex; align-items: center; gap: 9px; text-align: left; cursor: pointer;
  padding: 10px; border-radius: 13px; transition: .15s; color: var(--text, #eef1ff);
  border: 1px solid color-mix(in srgb, var(--r-accent, #38e1ff) 32%, transparent);
  background: linear-gradient(180deg, color-mix(in srgb, var(--r-accent, #38e1ff) 12%, transparent), rgba(255,255,255,.02)); }
.realm-card:hover { transform: translateY(-1px); border-color: var(--r-accent, #38e1ff); }
.rc-ico { font-size: 22px; flex: none; }
.rc-main { display: flex; flex-direction: column; min-width: 0; }
.rc-name { font-family: "Russo One", system-ui, sans-serif; font-size: 13px; }
.rc-tag { font-size: 10.5px; color: var(--muted, #9aa0c7); margin-top: 2px; line-height: 1.25; }

.realm-hero { text-align: center; padding: 20px 16px; border-radius: 18px; margin-bottom: 14px;
  border: 1px solid color-mix(in srgb, var(--r-accent, #38e1ff) 36%, transparent);
  background: radial-gradient(130% 120% at 50% 0%, color-mix(in srgb, var(--r-accent, #38e1ff) 18%, transparent), rgba(255,255,255,.02)); }
.realm-hero-ico { font-size: 46px; line-height: 1; }
.realm-hero-name { font-family: "Russo One", system-ui, sans-serif; font-size: 23px; color: var(--text, #eef1ff); margin-top: 6px; }
.realm-hero-tag { font-size: 12.5px; color: var(--r-accent, #38e1ff); margin-top: 3px; }
.realm-lore { font-size: 14.5px; line-height: 1.6; color: var(--text, #eef1ff); margin-top: 12px; opacity: .92; }

.realm-facts { border: 1px solid rgba(255,209,102,.28); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px;
  background: rgba(255,209,102,.07); }
.rf-h { font-family: "Russo One", system-ui, sans-serif; font-size: 14px; color: var(--star-gold, #ffd166); margin-bottom: 8px; }
.realm-facts ul { margin: 0; padding-left: 20px; }
.realm-facts li { font-size: 14px; line-height: 1.55; color: var(--text, #eef1ff); margin-bottom: 7px; }

/* ============================================================
   Обложки миров (постеры) + анимации визуала
   ============================================================ */
.realm-card { display: flex; flex-direction: column; gap: 0; padding: 0; overflow: hidden; }
.rc-cover { display: block; width: 100%; aspect-ratio: 240 / 96; overflow: hidden; line-height: 0; }
.rc-cover .realm-cover-svg { width: 100%; height: 100%; display: block; }
.rc-body { display: flex; align-items: center; gap: 8px; padding: 9px 11px; }
.rc-body .rc-ico { font-size: 18px; flex: none; }
.rc-body .rc-name { font-family: "Russo One", system-ui, sans-serif; font-size: 13px; line-height: 1.15; }
.realm-card:hover { box-shadow: 0 10px 28px color-mix(in srgb, var(--r-accent, #38e1ff) 30%, transparent); }

/* большая обложка на странице мира */
.realm-cover { width: 100%; border-radius: 16px; overflow: hidden; line-height: 0; margin-bottom: 14px;
  box-shadow: 0 10px 30px color-mix(in srgb, var(--r-accent, #38e1ff) 24%, transparent);
  animation: floatY 6s ease-in-out infinite; }
.realm-cover .realm-cover-svg { width: 100%; height: 156px; display: block; }

/* ключевые кадры */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
@keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes popIn { 0% { opacity: 0; transform: scale(.96); } 100% { opacity: 1; transform: scale(1); } }
@keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 0 transparent); } 50% { filter: drop-shadow(0 0 6px color-mix(in srgb, var(--r-accent, #38e1ff) 60%, transparent)); } }

/* мягкое появление контента */
.gh-sec { animation: fadeInUp .5s ease both; }
.mq-illus { animation: popIn .5s ease both; }
.realm-hero { animation: fadeInUp .45s ease both; }
.tr-card { animation: popIn .35s ease both; }

/* лёгкий стаггер карточек миров */
.realm-grid .realm-card { animation: fadeInUp .5s ease both; }
.realm-grid .realm-card:nth-child(1) { animation-delay: .03s; }

/* уважение к настройке «меньше движения» */

}

/* ============================================================
   Движение интерфейса: переходы, дышащий персонаж, отклик
   ============================================================ */
@keyframes viewFade { from { opacity: 0; transform: translateY(12px) scale(.996); } to { opacity: 1; transform: none; } }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
@keyframes shimmer { 0% { transform: translateX(-130%); } 100% { transform: translateX(260%); } }
@keyframes spinSlow { from { transform: rotate(0); } to { transform: rotate(360deg); } }

/* плавная смена экранов */
.screen { animation: viewFade .32s cubic-bezier(.2,.8,.2,1) both; }

/* «дышащий» Ньютончик во всех местах */
.newton-svg { animation: breathe 3.8s ease-in-out infinite; transform-origin: 50% 62%; }

/* отклик кнопок и карточек */
.btn { transition: transform .08s ease, box-shadow .15s ease, filter .15s ease; }
.btn:active { transform: translateY(1px) scale(.985); }
.tab { transition: transform .12s ease; }
.tab.active .ico { display: inline-block; animation: popIn .32s ease; }
.subtab { transition: transform .12s ease, background .15s ease, color .15s ease; }
.realm-card, .grade-card, .prog-item, .mq-row, .know-row, .option { transition: transform .14s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease; }
.prog-item:hover, .mq-row:hover:not(.locked) { transform: translateX(3px); }

/* мерцание полос прогресса */
.mq-progress, .xp-bar, .progress, .bar { position: relative; overflow: hidden; }
.mq-progress-fill::after { content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
  animation: shimmer 2.4s ease-in-out infinite; }

/* мягкое появление строк-глав/тем */
.prog-grade .prog-item, .gh-sec .prog-item { animation: viewFade .4s ease both; }

@media (prefers-reduced-motion: reduce) {
  .screen, .newton-svg, .mq-progress-fill::after, .tab.active .ico,
  .prog-grade .prog-item, .gh-sec .prog-item { animation: none !important; }
}

/* ============================================================
   Картинки тем/миров (авто-подхват из images/, иначе — SVG),
   конфетти, всплытие опыта, фон-частицы
   ============================================================ */
.auto-photo { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: inherit; }
.mq-illus { position: relative; }
.mq-illus .auto-photo { max-height: 150px; border-radius: 12px; }
.mq-illus.has-photo svg { display: none; }
.realm-cover.has-photo .realm-cover-svg { display: none; }
.realm-cover .auto-photo { height: 156px; }

/* плавная заливка полосы опыта */
.bar-xp .bar-fill { transition: width .6s cubic-bezier(.22,.61,.36,1); }

/* конфетти */
.confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
.confetti-bit { position: absolute; top: -14px; border-radius: 2px; opacity: .95;
  animation-name: confettiFall; animation-timing-function: cubic-bezier(.3,.6,.4,1); animation-iteration-count: 1; }
@keyframes confettiFall { 0% { transform: translateY(-14px) rotateZ(0); opacity: 1; } 100% { transform: translateY(112vh) rotateZ(var(--spin, 640deg)); opacity: .85; } }

/* «+XP» у HUD */
.hud { position: relative; }
.xp-float { position: absolute; right: 12px; top: 6px; font-family: "Russo One", system-ui, sans-serif; font-size: 14px; color: #7ee787;
  text-shadow: 0 2px 8px rgba(0,0,0,.55); pointer-events: none; animation: xpFloat 1.3s ease-out forwards; z-index: 5; }
@keyframes xpFloat { 0% { opacity: 0; transform: translateY(6px) scale(.9); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-22px) scale(1.05); } }

/* фон-частицы на страницах классов/миров */
.screen { position: relative; }
.screen > * { position: relative; z-index: 1; }
.screen-fx { position: absolute; inset: -10px 0 0; z-index: 0 !important; overflow: hidden; pointer-events: none; }
.screen-fx i { position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(120,200,255,.55), transparent 70%);
  animation-name: fxdrift; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
@keyframes fxdrift { 0%, 100% { transform: translateY(0) translateX(0); opacity: .22; } 50% { transform: translateY(-26px) translateX(8px); opacity: .6; } }

@media (prefers-reduced-motion: reduce) {
  .confetti-bit, .xp-float, .screen-fx i, .bar-xp .bar-fill { animation: none !important; }
}

/* ============================================================
   Постерные фоны под темы (тематический градиент + светящиеся пятна)
   ============================================================ */
.mq-illus.poster { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,.10); border-radius: 16px;
  padding: 12px; min-height: 132px; display: flex; align-items: center; justify-content: center; isolation: isolate; }
.mq-illus.poster::before, .mq-illus.poster::after { content: ""; position: absolute; border-radius: 50%;
  filter: blur(24px); opacity: .55; z-index: 0; pointer-events: none; }
.mq-illus.poster::before { width: 170px; height: 170px; top: -55px; left: -35px;

/* тематические градиенты */
